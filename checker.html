<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Savol Boshqaruv Paneli</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Sora:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0d0f14;--surface:#161a23;--surface2:#1e2330;--border:#2a3045;--accent:#4f8ef7;--accent2:#7c5cfc;--green:#2ecc71;--red:#e74c3c;--yellow:#f1c40f;--text:#e8eaf0;--muted:#6b7280;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;min-height:100vh;padding-bottom:60px}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
header .logo{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px}
header h1{font-size:16px;font-weight:800;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tabs{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:'Sora',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s}
.tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff}
.page{display:none;max-width:900px;margin:0 auto;padding:24px 20px}
.page.active{display:block}
input,textarea,select{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'Sora',sans-serif;font-size:13px;padding:9px 12px;outline:none;width:100%;transition:border-color 0.2s}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:60px}
.field{margin-bottom:12px}
.field label{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;display:block;margin-bottom:5px}
.row{display:flex;gap:10px}
.row>*{flex:1}
.btn{padding:9px 18px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:'Sora',sans-serif}
.btn-blue{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-green{background:#27ae60;color:#fff}
.btn-gray{background:var(--surface2);color:var(--text)}
.btn:hover{opacity:0.85;transform:translateY(-1px)}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;font-family:'IBM Plex Mono',monospace}
.bb{background:rgba(79,142,247,0.15);color:var(--accent)}
.bg{background:rgba(39,174,96,0.15);color:var(--green)}
.bp{background:rgba(124,92,252,0.15);color:var(--accent2)}
.bo{background:rgba(230,126,34,0.15);color:#e67e22}
.br{background:rgba(231,76,60,0.15);color:var(--red)}
.bx{background:rgba(107,114,128,0.15);color:var(--muted)}
.search-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-bar input{flex:1;min-width:200px}
.search-bar select{width:auto;min-width:120px;flex:0;font-family:'IBM Plex Mono',monospace;font-size:12px}
.q-list{display:flex;flex-direction:column;gap:8px}
.q-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all 0.2s}
.q-item:hover,.q-item.selected{border-color:var(--accent);background:var(--surface2)}
.q-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.q-purpose{font-size:13px;color:var(--text);line-height:1.5}
.q-sub{font-size:11px;color:var(--muted);margin-top:3px;font-family:'IBM Plex Mono',monospace}
.edit-panel{background:var(--surface);border:1.5px solid var(--accent);border-radius:14px;padding:20px;margin-top:16px}
.edit-title{font-size:15px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.option-box{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:12px;transition:border-color 0.2s}
.option-box.correct-box{border-color:var(--green)}
.option-label{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;font-family:'IBM Plex Mono',monospace}
.correct-radio{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);cursor:pointer}
.correct-radio input{width:auto;accent-color:var(--green)}
.upload-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;background:var(--surface2);border:1.5px dashed var(--border);border-radius:8px;color:var(--muted);font-size:12px;font-family:'IBM Plex Mono',monospace;cursor:pointer;position:relative;overflow:hidden;transition:all 0.2s;margin-top:6px}
.upload-btn:hover{border-color:var(--accent);color:var(--accent)}
.upload-btn input[type=file]{position:absolute;opacity:0;width:100%;height:100%;top:0;left:0;cursor:pointer}
.file-status{font-size:11px;margin-top:4px;font-family:'IBM Plex Mono',monospace}
.has-file{color:var(--green)}
.no-file{color:var(--muted)}
.preview-img{max-width:100%;max-height:120px;border-radius:8px;margin-top:6px;display:none}
.status{padding:10px 14px;border-radius:8px;font-size:13px;font-weight:600;margin-bottom:14px;display:none}
.status.success{background:rgba(39,174,96,0.1);border:1px solid rgba(39,174,96,0.3);color:var(--green);display:block}
.status.error{background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.3);color:var(--red);display:block}
.status.loading{background:rgba(241,196,15,0.1);color:var(--yellow);display:block}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat-num{font-size:28px;font-weight:900;font-family:'IBM Plex Mono',monospace}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:4px}
.section-lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;margin:12px 0 6px;font-family:'IBM Plex Mono',monospace}
.detail-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:13px;line-height:1.6}
.null-tag{background:rgba(231,76,60,0.1);color:var(--red);font-size:11px;padding:3px 8px;border-radius:5px;display:inline-block;font-family:'IBM Plex Mono',monospace}
.ok-tag{color:var(--green);font-size:11px;font-family:'IBM Plex Mono',monospace}
.spinner{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
@media(max-width:600px){.options-grid{grid-template-columns:1fr}.row{flex-direction:column}}
</style>
</head>
<body>
 
<header>
  <div class="logo">🇰🇷</div>
  <h1>Savol Boshqaruv Paneli</h1>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('search',this)">🔎 Qidirish</button>
    <button class="tab" onclick="switchTab('last',this)">📥 Eng so'nggi</button>
    <button class="tab" onclick="switchTab('stats',this)">📊 Statistika</button>
  </div>
</header>
 
<div id="tab-search" class="page active">
  <div id="searchStatus" class="status"></div>
  <div class="search-bar">
    <input id="searchInput" type="text" placeholder="🔍 Savol maqsadi yoki matni bo'yicha..." oninput="onSearch()"/>
    <select id="filterSection" onchange="onSearch()">
      <option value="">Barcha bo'limlar</option>
      <option value="EPS TOPIK">EPS TOPIK</option>
      <option value="TOPIK 1">TOPIK 1</option>
      <option value="TOPIK 2">TOPIK 2</option>
    </select>
    <select id="filterType" onchange="onSearch()">
      <option value="">Barcha turlar</option>
      <option value="Listening">🎧 Listening</option>
      <option value="Reading">📖 Reading</option>
    </select>
    <select id="filterDiff" onchange="onSearch()">
      <option value="">Barcha qiyinliklar</option>
      <option value="Very Easy">Very Easy</option>
      <option value="Easy">Easy</option>
      <option value="Medium">Medium</option>
      <option value="Above Medium">Above Medium</option>
      <option value="Hard">Hard</option>
    </select>
    <button class="btn btn-blue" onclick="loadAll()">🔄 Yuklash</button>
  </div>
  <div id="resultCount" style="font-size:12px;color:var(--muted);margin-bottom:10px;font-family:'IBM Plex Mono',monospace"></div>
  <div id="qList" class="q-list"><div class="spinner">⏳ "Yuklash" tugmasini bosing...</div></div>
  <div id="editPanel" style="display:none"></div>
</div>
 
<div id="tab-last" class="page">
  <div id="lastStatus" class="status"></div>
  <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center">
    <select id="lastSection" style="max-width:260px">
      <option value="">Eng so'nggi (barchadan)</option>
      <option value="EPS TOPIK">EPS TOPIK</option>
      <option value="TOPIK 1">TOPIK 1</option>
      <option value="TOPIK 2">TOPIK 2</option>
    </select>
    <button class="btn btn-blue" onclick="loadLast()">📥 Yuklash</button>
  </div>
  <div id="lastResult"></div>
</div>
 
<div id="tab-stats" class="page">
  <div id="statsStatus" class="status"></div>
  <div style="margin-bottom:16px">
    <button class="btn btn-blue" onclick="loadStats()">📊 Yuklash</button>
  </div>
  <div id="statsResult"></div>
</div>
 
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyAOgwoxezdtV89KTdapbVHqzYjjt61_Cfk",
  authDomain:"koreantestapp.firebaseapp.com",
  projectId:"koreantestapp",
  storageBucket:"koreantestapp.firebasestorage.app",
  messagingSenderId:"927061643427",
  appId:"1:927061643427:web:89338d7127243e38ed6f16"
});
var db=firebase.firestore();
var storage=firebase.storage();
var allQuestions=[];
var selectedId=null;
var newFiles={qAudio:null,qImage:null,opt:[null,null,null,null],optImg:[null,null,null,null]};
 
function setStatus(id,msg,type){var el=document.getElementById(id);if(!el)return;el.textContent=msg;el.className='status '+type}
function switchTab(name,btn){document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});document.getElementById('tab-'+name).classList.add('active');if(btn)btn.classList.add('active')}
 
async function uploadFile(file,path){
  var ref=storage.ref(path);
  var snap=await ref.put(file);
  return await snap.ref.getDownloadURL();
}
 
function onFileChange(type,idx,input){
  var file=input.files[0];if(!file)return;
  if(type==='qAudio'){newFiles.qAudio=file;showFS('qAudioStatus','🎧 '+file.name,true)}
  else if(type==='qImage'){newFiles.qImage=file;showFS('qImageStatus','🖼 '+file.name,true);previewImg(file,'qImagePreview')}
  else if(type==='optAudio'){newFiles.opt[idx]=file;showFS('optAudio'+idx+'Status','🎧 '+file.name,true)}
  else if(type==='optImage'){newFiles.optImg[idx]=file;showFS('optImg'+idx+'Status','🖼 '+file.name,true);previewImg(file,'optImg'+idx+'Preview')}
}
function showFS(id,msg,ok){var el=document.getElementById(id);if(el){el.textContent=msg;el.className='file-status '+(ok?'has-file':'no-file')}}
function previewImg(file,id){var r=new FileReader();r.onload=function(e){var img=document.getElementById(id);if(img){img.src=e.target.result;img.style.display='block'}};r.readAsDataURL(file)}
 
function loadAll(){
  setStatus('searchStatus','⏳ Yuklanmoqda...','loading');
  document.getElementById('qList').innerHTML='<div class="spinner">⏳ Yuklanmoqda...</div>';
  document.getElementById('editPanel').style.display='none';
  db.collection('questions').get().then(function(snap){
    allQuestions=snap.docs.map(function(d){var data=d.data();data._id=d.id;return data});
    setStatus('searchStatus','✅ '+allQuestions.length+' ta savol yuklandi!','success');
    onSearch();
  }).catch(function(e){setStatus('searchStatus','❌ Xato: '+e.message,'error')});
}
 
function onSearch(){
  var q=document.getElementById('searchInput').value.toLowerCase().trim();
  var sec=document.getElementById('filterSection').value;
  var type=document.getElementById('filterType').value;
  var diff=document.getElementById('filterDiff').value;
  var filtered=allQuestions.filter(function(item){
    return(!q||(item.purpose||'').toLowerCase().includes(q)||(item.questionText||'').toLowerCase().includes(q))&&
           (!sec||item.section===sec)&&(!type||item.testType===type)&&(!diff||item.difficulty===diff);
  });
  renderList(filtered);
}
 
function renderList(list){
  document.getElementById('resultCount').textContent=list.length+' ta savol topildi';
  var el=document.getElementById('qList');
  if(!list.length){el.innerHTML='<div class="spinner">😕 Savol topilmadi</div>';return}
  el.innerHTML='';
  list.forEach(function(item){
    var div=document.createElement('div');
    div.className='q-item'+(item._id===selectedId?' selected':'');
    div.onclick=function(){selectQuestion(item._id)};
    var tc=item.testType==='Listening'?'bg':item.testType==='Reading'?'bp':'br';
    var dc={'Very Easy':'bg','Easy':'bg','Medium':'bo','Above Medium':'bo','Hard':'br'}[item.difficulty]||'bx';
    div.innerHTML=
      '<div class="q-meta">'+
        '<span class="badge bb">'+(item.section||'?')+'</span>'+
        '<span class="badge '+tc+'">'+(item.testType==='Listening'?'🎧 ':item.testType==='Reading'?'📖 ':'⚠️ ')+(item.testType||'type yo\'q')+'</span>'+
        '<span class="badge '+dc+'">'+(item.difficulty||'?')+'</span>'+
        (item.questionAudioUrl?'<span class="badge bg">🎧 Audio bor</span>':'<span class="badge br">🔇 yo\'q</span>')+
        (item.questionImageUrl?'<span class="badge bx">🖼</span>':'')+
      '</div>'+
      '<div class="q-purpose">'+(item.purpose||'<span style="color:var(--muted)">maqsad yo\'q</span>')+'</div>'+
      (item.questionText?'<div class="q-sub">'+item.questionText.substring(0,80)+'...</div>':'');
    el.appendChild(div);
  });
}
 
function selectQuestion(id){
  selectedId=id;
  newFiles={qAudio:null,qImage:null,opt:[null,null,null,null],optImg:[null,null,null,null]};
  onSearch();
  var item=allQuestions.find(function(q){return q._id===id});
  if(!item)return;
  var panel=document.getElementById('editPanel');
  panel.style.display='block';
  var diffOpts=['Very Easy','Easy','Medium','Above Medium','Hard'].map(function(d){
    return'<option value="'+d+'"'+(item.difficulty===d?' selected':'')+'>'+d+'</option>';
  }).join('');
  var qAudioHtml=
    '<div class="field"><label>🎧 Savol Audio</label>'+
    '<div class="file-status '+(item.questionAudioUrl?'has-file':'no-file')+'" id="qAudioStatus">'+(item.questionAudioUrl?'✅ Audio mavjud':'❌ Audio yo\'q')+'</div>'+
    (item.questionAudioUrl?'<audio controls src="'+item.questionAudioUrl+'" style="width:100%;margin:6px 0"></audio>':'')+
    '<label class="upload-btn">📤 '+(item.questionAudioUrl?'Yangi audio':'Audio qo\'shish')+'<input type="file" accept="audio/*" onchange="onFileChange(\'qAudio\',0,this)"></label></div>';
  var qImageHtml=
    '<div class="field"><label>🖼 Savol Rasmi</label>'+
    '<div class="file-status '+(item.questionImageUrl?'has-file':'no-file')+'" id="qImageStatus">'+(item.questionImageUrl?'✅ Rasm mavjud':'❌ Rasm yo\'q')+'</div>'+
    (item.questionImageUrl?'<img src="'+item.questionImageUrl+'" style="max-width:100%;max-height:120px;border-radius:8px;margin:6px 0"/>':'')+
    '<label class="upload-btn">📤 '+(item.questionImageUrl?'Yangi rasm':'Rasm qo\'shish')+'<input type="file" accept="image/*" onchange="onFileChange(\'qImage\',0,this)"></label>'+
    '<img id="qImagePreview" class="preview-img"/></div>';
  var optsHtml='';
  for(var i=0;i<4;i++){
    var opt=(item.options&&item.options[i])||{};
    var isC=item.correctIndex===i;
    optsHtml+=
      '<div class="option-box'+(isC?' correct-box':'')+'" id="optBox'+i+'">'+
        '<div class="option-label">VARIANT '+(i+1)+
          '<label class="correct-radio"><input type="radio" name="editCorrect" value="'+i+'"'+(isC?' checked':'')+' onchange="updateCorrectBox()"> To\'g\'ri ✓</label>'+
        '</div>'+
        '<div class="field"><label>Matn</label><textarea id="editOpt'+i+'">'+(opt.text||'')+'</textarea></div>'+
        '<div class="field"><label>Audio</label>'+
          '<div class="file-status '+(opt.audioUrl?'has-file':'no-file')+'" id="optAudio'+i+'Status">'+(opt.audioUrl?'✅ Audio bor':'❌ Yo\'q')+'</div>'+
          (opt.audioUrl?'<audio controls src="'+opt.audioUrl+'" style="width:100%;margin:4px 0"></audio>':'')+
          '<label class="upload-btn">📤 Audio<input type="file" accept="audio/*" onchange="onFileChange(\'optAudio\','+i+',this)"></label></div>'+
        '<div class="field"><label>Rasm</label>'+
          '<div class="file-status '+(opt.imageUrl?'has-file':'no-file')+'" id="optImg'+i+'Status">'+(opt.imageUrl?'✅ Rasm bor':'❌ Yo\'q')+'</div>'+
          (opt.imageUrl?'<img src="'+opt.imageUrl+'" style="max-width:100%;max-height:80px;border-radius:6px;margin:4px 0"/>':'')+
          '<label class="upload-btn">📤 Rasm<input type="file" accept="image/*" onchange="onFileChange(\'optImage\','+i+',this)"></label>'+
          '<img id="optImg'+i+'Preview" class="preview-img"/></div>'+
      '</div>';
  }
  panel.innerHTML=
    '<div class="edit-panel">'+
      '<div class="edit-title">✏️ Tahrirlash <button class="btn btn-gray" onclick="closeEdit()">✕ Yopish</button></div>'+
      '<div id="editStatus" class="status"></div>'+
      '<div class="row">'+
        '<div class="field"><label>Bo\'lim</label><select id="editSection">'+
          '<option'+(item.section==='EPS TOPIK'?' selected':'')+'>EPS TOPIK</option>'+
          '<option'+(item.section==='TOPIK 1'?' selected':'')+'>TOPIK 1</option>'+
          '<option'+(item.section==='TOPIK 2'?' selected':'')+'>TOPIK 2</option>'+
        '</select></div>'+
        '<div class="field"><label>Test turi</label><select id="editTestType">'+
          '<option value="Reading"'+(item.testType==='Reading'?' selected':'')+'>📖 Reading</option>'+
          '<option value="Listening"'+(item.testType==='Listening'?' selected':'')+'>🎧 Listening</option>'+
        '</select></div>'+
        '<div class="field"><label>Qiyinlik</label><select id="editDiff">'+diffOpts+'</select></div>'+
      '</div>'+
      '<div class="field"><label>Savol maqsadi</label><textarea id="editPurpose">'+(item.purpose||'')+'</textarea></div>'+
      '<div class="field"><label>Savol matni</label><textarea id="editQText">'+(item.questionText||'')+'</textarea></div>'+
      '<hr class="divider"/>'+
      '<div class="row">'+qAudioHtml+qImageHtml+'</div>'+
      '<hr class="divider"/>'+
      '<div class="field"><label>Variantlar</label><div class="options-grid">'+optsHtml+'</div></div>'+
      '<div style="display:flex;gap:10px;margin-top:16px">'+
        '<button class="btn btn-green" id="saveBtn" onclick="saveEdit(\''+id+'\')">💾 Saqlash</button>'+
        '<button class="btn btn-gray" onclick="closeEdit()">Bekor qilish</button>'+
      '</div>'+
    '</div>';
  panel.scrollIntoView({behavior:'smooth',block:'start'});
}
 
function updateCorrectBox(){
  for(var i=0;i<4;i++){var b=document.getElementById('optBox'+i);if(b)b.className='option-box'}
  var c=document.querySelector('input[name="editCorrect"]:checked');
  if(c){var b=document.getElementById('optBox'+c.value);if(b)b.className='option-box correct-box'}
}
 
async function saveEdit(id){
  var c=document.querySelector('input[name="editCorrect"]:checked');
  if(!c){setStatus('editStatus','❌ To\'g\'ri javobni tanlang!','error');return}
  var saveBtn=document.getElementById('saveBtn');
  if(saveBtn)saveBtn.disabled=true;
  setStatus('editStatus','⏳ Saqlanmoqda...','loading');
  var ts=Date.now();
  var item=allQuestions.find(function(q){return q._id===id});
  try{
    var qAudioUrl=item.questionAudioUrl||null;
    if(newFiles.qAudio){setStatus('editStatus','📤 Savol audio...','loading');qAudioUrl=await uploadFile(newFiles.qAudio,'audio/'+ts+'_q_'+newFiles.qAudio.name)}
    var qImageUrl=item.questionImageUrl||null;
    if(newFiles.qImage){setStatus('editStatus','📤 Savol rasmi...','loading');qImageUrl=await uploadFile(newFiles.qImage,'images/'+ts+'_q_'+newFiles.qImage.name)}
    var opts=[];
    for(var i=0;i<4;i++){
      var old=(item&&item.options&&item.options[i])||{};
      var au=old.audioUrl||null;var iu=old.imageUrl||null;
      if(newFiles.opt[i]){au=await uploadFile(newFiles.opt[i],'audio/'+ts+'_o'+i+'_'+newFiles.opt[i].name)}
      if(newFiles.optImg[i]){iu=await uploadFile(newFiles.optImg[i],'images/'+ts+'_o'+i+'_'+newFiles.optImg[i].name)}
      opts.push({text:document.getElementById('editOpt'+i).value.trim()||null,fontSize:old.fontSize||18,audioUrl:au,imageUrl:iu});
    }
    var upd={
      section:document.getElementById('editSection').value,
      testType:document.getElementById('editTestType').value,
      difficulty:document.getElementById('editDiff').value,
      purpose:document.getElementById('editPurpose').value.trim()||null,
      questionText:document.getElementById('editQText').value.trim()||null,
      questionAudioUrl:qAudioUrl,questionImageUrl:qImageUrl,
      correctIndex:parseInt(c.value),options:opts
    };
    await db.collection('questions').doc(id).update(upd);
    var idx=allQuestions.findIndex(function(q){return q._id===id});
    if(idx!==-1)Object.keys(upd).forEach(function(k){allQuestions[idx][k]=upd[k]});
    setStatus('editStatus','✅ Saqlandi!','success');
    newFiles={qAudio:null,qImage:null,opt:[null,null,null,null],optImg:[null,null,null,null]};
    onSearch();
  }catch(e){setStatus('editStatus','❌ Xato: '+e.message,'error')}
  if(saveBtn)saveBtn.disabled=false;
}
 
function closeEdit(){
  selectedId=null;
  newFiles={qAudio:null,qImage:null,opt:[null,null,null,null],optImg:[null,null,null,null]};
  document.getElementById('editPanel').style.display='none';
  onSearch();
}
 
function loadLast(){
  setStatus('lastStatus','⏳ Yuklanmoqda...','loading');
  document.getElementById('lastResult').innerHTML='';
  var sec=document.getElementById('lastSection').value;
  var ref=db.collection('questions').orderBy('createdAt','desc').limit(1);
  if(sec)ref=db.collection('questions').where('section','==',sec).orderBy('createdAt','desc').limit(1);
  ref.get().then(function(snap){
    if(snap.empty){setStatus('lastStatus','😕 Topilmadi','error');return}
    var d=snap.docs[0].data();
    setStatus('lastStatus','✅ Yuklandi!','success');
    var html='<div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px">';
    html+='<div class="q-meta" style="margin-bottom:12px">';
    html+='<span class="badge bb">'+(d.section||'?')+'</span>';
    html+='<span class="badge '+(d.testType==='Listening'?'bg':'bp')+'">'+(d.testType==='Listening'?'🎧':'📖')+' '+(d.testType||'⚠️ testType YO\'Q')+'</span>';
    html+='<span class="badge bo">'+(d.difficulty||'?')+'</span>';
    html+=(d.questionAudioUrl?'<span class="badge bg">🎧 Audio bor</span>':'<span class="badge br">🔇 Audio yo\'q</span>');
    html+=(d.questionImageUrl?'<span class="badge bx">🖼 Rasm bor</span>':'');
    html+='</div>';
    html+='<div class="section-lbl">📌 Maqsad</div>'+(d.purpose?'<div class="detail-box">'+d.purpose+'</div>':'<span class="null-tag">null</span>');
    html+='<div class="section-lbl">❓ Savol</div>'+(d.questionText?'<div class="detail-box">'+d.questionText+'</div>':'<span class="null-tag">null</span>');
    html+='<div class="section-lbl">🎧 Audio</div>';
    if(d.questionAudioUrl)html+='<div class="ok-tag">✅ URL bor</div><audio controls src="'+d.questionAudioUrl+'" style="width:100%;margin-top:6px"></audio>';
    else html+='<span class="null-tag">null</span>';
    html+='<div class="section-lbl">🖼 Rasm</div>';
    if(d.questionImageUrl)html+='<img src="'+d.questionImageUrl+'" style="max-width:100%;max-height:200px;border-radius:8px;margin-top:6px"/>';
    else html+='<span class="null-tag">null</span>';
    html+='<div class="section-lbl">📋 Variantlar</div>';
    if(d.options)d.options.forEach(function(opt,i){
      var isC=i===d.correctIndex;
      html+='<div style="background:var(--bg);border:1.5px solid '+(isC?'var(--green)':'var(--border)')+';border-radius:8px;padding:10px;margin-bottom:8px">';
      html+='<span style="color:var(--accent);font-weight:800;font-family:IBM Plex Mono,monospace">'+(i+1)+(isC?' ✅':'')+'</span> ';
      html+=opt.text?'<span>'+opt.text+'</span>':'<span class="null-tag">null</span>';
      if(opt.audioUrl)html+='<div class="ok-tag">🎧 Audio bor</div><audio controls src="'+opt.audioUrl+'" style="width:100%;margin-top:4px"></audio>';
      if(opt.imageUrl)html+='<img src="'+opt.imageUrl+'" style="max-width:100%;max-height:100px;border-radius:6px;margin-top:4px"/>';
      html+='</div>';
    });
    html+='</div>';
    document.getElementById('lastResult').innerHTML=html;
  }).catch(function(e){setStatus('lastStatus','❌ Xato: '+e.message,'error')});
}
 
function loadStats(){
  setStatus('statsStatus','⏳ Yuklanmoqda...','loading');
  db.collection('questions').get().then(function(snap){
    var total=snap.size,bySection={},byType={Listening:0,Reading:0,noType:0},byDiff={},withAudio=0,noAudio=0;
    snap.docs.forEach(function(d){
      var data=d.data();
      bySection[data.section]=(bySection[data.section]||0)+1;
      if(data.testType==='Listening')byType.Listening++;
      else if(data.testType==='Reading')byType.Reading++;
      else byType.noType++;
      byDiff[data.difficulty]=(byDiff[data.difficulty]||0)+1;
      if(data.questionAudioUrl)withAudio++;else noAudio++;
    });
    function sc(num,label,color){return'<div class="stat-card"><div class="stat-num" style="color:'+color+'">'+num+'</div><div class="stat-lbl">'+label+'</div></div>'}
    var html='<div class="stat-grid">';
    html+=sc(total,'Jami','var(--text)')+sc(byType.Listening,'🎧 Listening','var(--green)')+sc(byType.Reading,'📖 Reading','var(--accent2)');
    html+=sc(byType.noType,'⚠️ Type yo\'q',byType.noType>0?'var(--red)':'var(--green)');
    html+=sc(withAudio,'🎧 Audio bor','var(--green)')+sc(noAudio,'🔇 Audio yo\'q','#e67e22');
    html+='</div>';
    html+='<div style="font-size:12px;font-weight:700;color:var(--muted);margin:14px 0 8px;font-family:IBM Plex Mono,monospace">BO\'LIM BO\'YICHA</div><div class="stat-grid">';
    Object.keys(bySection).forEach(function(k){html+=sc(bySection[k],k,'var(--accent)')});
    html+='</div>';
    html+='<div style="font-size:12px;font-weight:700;color:var(--muted);margin:14px 0 8px;font-family:IBM Plex Mono,monospace">QIYINLIK BO\'YICHA</div><div class="stat-grid">';
    var dc={'Very Easy':'#27ae60','Easy':'var(--green)','Medium':'var(--yellow)','Above Medium':'#e67e22','Hard':'var(--red)'};
    ['Very Easy','Easy','Medium','Above Medium','Hard'].forEach(function(k){html+=sc(byDiff[k]||0,k,dc[k])});
    html+='</div>';
    document.getElementById('statsResult').innerHTML=html;
    setStatus('statsStatus','✅ Tayyor!','success');
  }).catch(function(e){setStatus('statsStatus','❌ Xato: '+e.message,'error')});
}
</script>
</body>
