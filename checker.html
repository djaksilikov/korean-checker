<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<title>Savol Boshqaruv Paneli</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d0f14; color: #e8eaf0; font-family: sans-serif; }
 
/* Header */
.header { background: #161a23; border-bottom: 1px solid #2a3045; padding: 14px 24px; display: flex; align-items: center; gap: 14px; }
.header h1 { font-size: 17px; }
.tab { padding: 8px 18px; border-radius: 8px; border: 1.5px solid #2a3045; background: transparent; color: #6b7280; font-size: 13px; font-weight: 700; cursor: pointer; }
.tab.active { background: linear-gradient(135deg, #4f8ef7, #7c5cfc); border-color: transparent; color: #fff; }
 
/* Layout */
.page { display: none; padding: 20px; max-width: 900px; margin: 0 auto; }
.page.active { display: block; }
 
/* Cards */
.card { background: #161a23; border: 1px solid #2a3045; border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
.card-header { background: #1e2330; border-bottom: 1px solid #2a3045; padding: 12px 18px; font-size: 13px; font-weight: 700; }
.card-body { padding: 16px 18px; }
 
/* Inputs */
input, textarea, select {
  background: #0d0f14; border: 1.5px solid #2a3045; border-radius: 8px;
  color: #e8eaf0; font-size: 13px; padding: 9px 12px; outline: none; width: 100%;
}
input:focus, textarea:focus, select:focus { border-color: #4f8ef7; }
textarea { resize: vertical; min-height: 60px; font-family: sans-serif; }
label { font-size: 12px; color: #6b7280; display: block; margin-bottom: 5px; }
.field { margin-bottom: 12px; }
.row { display: flex; gap: 10px; }
.row > * { flex: 1; }
 
/* Buttons */
.btn { padding: 9px 18px; border-radius: 8px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.btn-blue { background: linear-gradient(135deg, #4f8ef7, #7c5cfc); color: #fff; }
.btn-green { background: #27ae60; color: #fff; }
.btn-red { background: #e74c3c; color: #fff; }
.btn-gray { background: #2a3045; color: #e8eaf0; }
.btn:hover { opacity: 0.85; transform: translateY(-1px); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
 
/* Badge */
.badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; display: inline-block; }
.badge-blue { background: rgba(79,142,247,0.15); color: #4f8ef7; }
.badge-green { background: rgba(39,174,96,0.15); color: #2ecc71; }
.badge-purple { background: rgba(124,92,252,0.15); color: #7c5cfc; }
.badge-orange { background: rgba(230,126,34,0.15); color: #e67e22; }
.badge-red { background: rgba(231,76,60,0.15); color: #e74c3c; }
.badge-gray { background: rgba(107,114,128,0.15); color: #6b7280; }
 
/* Search */
.search-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.search-bar input { flex: 1; min-width: 200px; }
.search-bar select { width: auto; min-width: 130px; flex: 0; }
 
/* Question list */
.q-list { display: flex; flex-direction: column; gap: 10px; }
.q-item { background: #161a23; border: 1px solid #2a3045; border-radius: 10px; padding: 14px 16px; cursor: pointer; transition: all 0.2s; }
.q-item:hover { border-color: #4f8ef7; background: #1a1f2e; }
.q-item.selected { border-color: #4f8ef7; background: #1a1f2e; }
.q-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.q-purpose { font-size: 13px; color: #e8eaf0; line-height: 1.5; }
.q-sub { font-size: 11px; color: #6b7280; margin-top: 4px; }
 
/* Edit panel */
.edit-panel { background: #161a23; border: 1px solid #2a3045; border-radius: 12px; padding: 20px; margin-top: 16px; }
.edit-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.option-box { background: #0d0f14; border: 1.5px solid #2a3045; border-radius: 8px; padding: 12px; }
.option-box.correct-box { border-color: #27ae60; }
.option-label { font-size: 11px; font-weight: 700; color: #4f8ef7; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
.correct-radio { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #6b7280; cursor: pointer; }
.correct-radio input { width: auto; accent-color: #27ae60; }
 
/* Status */
.status { padding: 10px 14px; border-radius: 8px; font-size: 13px; font-weight: 700; margin-bottom: 14px; display: none; }
.status.success { background: rgba(39,174,96,0.15); color: #2ecc71; display: block; }
.status.error { background: rgba(231,76,60,0.15); color: #e74c3c; display: block; }
.status.loading { background: rgba(241,196,15,0.1); color: #f1c40f; display: block; }
 
/* Stats */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
.stat-card { background: #161a23; border: 1px solid #2a3045; border-radius: 10px; padding: 14px; text-align: center; }
.stat-num { font-size: 28px; font-weight: 900; }
.stat-label { font-size: 11px; color: #6b7280; margin-top: 4px; }
 
/* Last question */
.detail-box { background: #0d0f14; border: 1px solid #2a3045; border-radius: 8px; padding: 12px; margin-top: 6px; }
.section-lbl { font-size: 11px; font-weight: 700; color: #6b7280; text-transform: uppercase; margin: 12px 0 6px; }
.null-tag { background: rgba(231,76,60,0.1); color: #e74c3c; font-size: 11px; padding: 3px 8px; border-radius: 5px; display: inline-block; }
.ok-tag { color: #2ecc71; font-size: 11px; }
 
/* Loading spinner */
.spinner { text-align: center; padding: 30px; color: #6b7280; font-size: 13px; }
 
@media(max-width: 600px) {
  .options-grid { grid-template-columns: 1fr; }
  .row { flex-direction: column; }
}
</style>
</head>
<body>
 
<div class="header">
  <h1>🇰🇷 Savol Boshqaruv Paneli</h1>
  <button class="tab active" onclick="switchTab('search')">🔎 Qidirish & Tahrirlash</button>
  <button class="tab" onclick="switchTab('last')">📥 Eng so'nggi</button>
  <button class="tab" onclick="switchTab('stats')">📊 Statistika</button>
</div>
 
<!-- ══════════════ SEARCH TAB ══════════════ -->
<div id="tab-search" class="page active">
  <div id="searchStatus" class="status"></div>
 
  <div class="search-bar">
    <input id="searchInput" type="text" placeholder="🔍 Savol maqsadi bo'yicha qidiring... (masalan: 다음을 듣고)" oninput="onSearch()"/>
    <select id="filterSection" onchange="onSearch()">
      <option value="">Barcha bo'limlar</option>
      <option value="EPS TOPIK">EPS TOPIK</option>
      <option value="TOPIK 1">TOPIK 1</option>
      <option value="TOPIK 2">TOPIK 2</option>
    </select>
    <select id="filterType" onchange="onSearch()">
      <option value="">Barcha turlar</option>
      <option value="Listening">Listening</option>
      <option value="Reading">Reading</option>
    </select>
    <select id="filterDiff" onchange="onSearch()">
      <option value="">Barcha qiyinliklar</option>
      <option value="Very Easy">Very Easy</option>
      <option value="Easy">Easy</option>
      <option value="Medium">Medium</option>
      <option value="Above Medium">Above Medium</option>
      <option value="Hard">Hard</option>
    </select>
    <button class="btn btn-blue" onclick="loadAll()">🔄 Yuklash</button>
  </div>
 
  <div id="resultCount" style="font-size:12px;color:#6b7280;margin-bottom:10px;"></div>
  <div id="qList" class="q-list"><div class="spinner">⏳ "Yuklash" tugmasini bosing...</div></div>
  <div id="editPanel" style="display:none"></div>
</div>
 
<!-- ══════════════ LAST TAB ══════════════ -->
<div id="tab-last" class="page">
  <div id="lastStatus" class="status"></div>
  <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
    <select id="lastSection">
      <option value="">Eng so'nggi (barchadan)</option>
      <option value="EPS TOPIK">EPS TOPIK — eng so'nggi</option>
      <option value="TOPIK 1">TOPIK 1 — eng so'nggi</option>
      <option value="TOPIK 2">TOPIK 2 — eng so'nggi</option>
    </select>
    <button class="btn btn-blue" onclick="loadLast()">📥 Yuklash</button>
  </div>
  <div id="lastResult"></div>
</div>
 
<!-- ══════════════ STATS TAB ══════════════ -->
<div id="tab-stats" class="page">
  <div id="statsStatus" class="status"></div>
  <div style="margin-bottom:14px">
    <button class="btn btn-blue" onclick="loadStats()">📊 Statistikani yuklash</button>
  </div>
  <div id="statsResult"></div>
</div>
 
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs, doc, updateDoc, orderBy, query, limit, where } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
 
const app = initializeApp({
  apiKey: "AIzaSyAOgwoxezdtV89KTdapbVHqzYjjt61_Cfk",
  authDomain: "koreantestapp.firebaseapp.com",
  projectId: "koreantestapp",
  storageBucket: "koreantestapp.firebasestorage.app",
  messagingSenderId: "927061643427",
  appId: "1:927061643427:web:89338d7127243e38ed6f16"
});
const db = getFirestore(app);
 
var allQuestions = [];
var selectedId = null;
 
// ══ Tab switching ══
window.switchTab = function(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
};
 
// ══════════════ SEARCH & EDIT ══════════════
window.loadAll = async function() {
  setStatus('searchStatus', '⏳ Yuklanmoqda...', 'loading');
  document.getElementById('qList').innerHTML = '<div class="spinner">⏳ Yuklanmoqda...</div>';
  document.getElementById('editPanel').style.display = 'none';
  try {
    var snap = await getDocs(collection(db, 'questions'));
    allQuestions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    setStatus('searchStatus', '✅ ' + allQuestions.length + ' ta savol yuklandi!', 'success');
    renderList(allQuestions);
  } catch(e) {
    setStatus('searchStatus', '❌ Xato: ' + e.message, 'error');
  }
};
 
window.onSearch = function() {
  var q = document.getElementById('searchInput').value.toLowerCase().trim();
  var sec = document.getElementById('filterSection').value;
  var type = document.getElementById('filterType').value;
  var diff = document.getElementById('filterDiff').value;
 
  var filtered = allQuestions.filter(function(item) {
    var purpose = (item.purpose || '').toLowerCase();
    var qtext = (item.questionText || '').toLowerCase();
    var matchQ = !q || purpose.includes(q) || qtext.includes(q);
    var matchS = !sec || item.section === sec;
    var matchT = !type || item.testType === type;
    var matchD = !diff || item.difficulty === diff;
    return matchQ && matchS && matchT && matchD;
  });
 
  renderList(filtered);
};
 
function renderList(list) {
  document.getElementById('resultCount').textContent = list.length + ' ta savol topildi';
  var el = document.getElementById('qList');
 
  if (list.length === 0) {
    el.innerHTML = '<div class="spinner">😕 Savol topilmadi</div>';
    return;
  }
 
  el.innerHTML = '';
  list.forEach(function(item) {
    var div = document.createElement('div');
    div.className = 'q-item' + (item.id === selectedId ? ' selected' : '');
    div.onclick = function() { selectQuestion(item.id); };
 
    var typeColor = item.testType === 'Listening' ? 'badge-green' : item.testType === 'Reading' ? 'badge-purple' : 'badge-red';
    var diffColor = { 'Very Easy':'badge-green','Easy':'badge-green','Medium':'badge-orange','Above Medium':'badge-orange','Hard':'badge-red' }[item.difficulty] || 'badge-gray';
 
    div.innerHTML =
      '<div class="q-meta">' +
        '<span class="badge badge-blue">' + (item.section||'?') + '</span>' +
        '<span class="badge ' + typeColor + '">' + (item.testType||'⚠️ type yo\'q') + '</span>' +
        '<span class="badge ' + diffColor + '">' + (item.difficulty||'?') + '</span>' +
        (item.questionAudioUrl ? '<span class="badge badge-gray">🎧</span>' : '') +
        (item.questionImageUrl ? '<span class="badge badge-gray">🖼</span>' : '') +
      '</div>' +
      '<div class="q-purpose">' + (item.purpose || '<span style="color:#6b7280">maqsad yo\'q</span>') + '</div>' +
      (item.questionText ? '<div class="q-sub">' + item.questionText.substring(0, 60) + '...</div>' : '');
 
    el.appendChild(div);
  });
}
 
function selectQuestion(id) {
  selectedId = id;
  // Re-render list to show selected
  onSearch();
 
  var item = allQuestions.find(q => q.id === id);
  if (!item) return;
 
  var panel = document.getElementById('editPanel');
  panel.style.display = 'block';
 
  var diffOptions = ['Very Easy','Easy','Medium','Above Medium','Hard'].map(d =>
    '<option value="' + d + '"' + (item.difficulty === d ? ' selected' : '') + '>' + d + '</option>'
  ).join('');
 
  var optionsHtml = '';
  for (var i = 0; i < 4; i++) {
    var opt = (item.options && item.options[i]) || {};
    var isCorrect = item.correctIndex === i;
    optionsHtml +=
      '<div class="option-box' + (isCorrect ? ' correct-box' : '') + '" id="optBox' + i + '">' +
        '<div class="option-label">' +
          'VARIANT ' + (i+1) +
          '<label class="correct-radio">' +
            '<input type="radio" name="editCorrect" value="' + i + '"' + (isCorrect ? ' checked' : '') + ' onchange="updateCorrectBox()"> To\'g\'ri ✓' +
          '</label>' +
        '</div>' +
        '<textarea id="editOpt' + i + '" placeholder="Variant ' + (i+1) + '...">' + (opt.text || '') + '</textarea>' +
      '</div>';
  }
 
  panel.innerHTML =
    '<div class="edit-panel">' +
      '<div class="edit-title">' +
        '✏️ Tahrirlash' +
        '<button class="btn btn-gray" onclick="closeEdit()">✕ Yopish</button>' +
      '</div>' +
      '<div id="editStatus" class="status"></div>' +
 
      '<div class="row">' +
        '<div class="field">' +
          '<label>Bo\'lim</label>' +
          '<select id="editSection">' +
            '<option' + (item.section==='EPS TOPIK'?' selected':'') + '>EPS TOPIK</option>' +
            '<option' + (item.section==='TOPIK 1'?' selected':'') + '>TOPIK 1</option>' +
            '<option' + (item.section==='TOPIK 2'?' selected':'') + '>TOPIK 2</option>' +
          '</select>' +
        '</div>' +
        '<div class="field">' +
          '<label>Test turi</label>' +
          '<select id="editTestType">' +
            '<option value="Reading"' + (item.testType==='Reading'?' selected':'') + '>📖 Reading</option>' +
            '<option value="Listening"' + (item.testType==='Listening'?' selected':'') + '>🎧 Listening</option>' +
          '</select>' +
        '</div>' +
        '<div class="field">' +
          '<label>Qiyinlik</label>' +
          '<select id="editDiff">' + diffOptions + '</select>' +
        '</div>' +
      '</div>' +
 
      '<div class="field">' +
        '<label>Savol maqsadi</label>' +
        '<textarea id="editPurpose">' + (item.purpose || '') + '</textarea>' +
      '</div>' +
 
      '<div class="field">' +
        '<label>Savol matni</label>' +
        '<textarea id="editQText">' + (item.questionText || '') + '</textarea>' +
      '</div>' +
 
      '<div class="field">' +
        '<label>Variantlar</label>' +
        '<div class="options-grid">' + optionsHtml + '</div>' +
      '</div>' +
 
      '<div style="display:flex;gap:10px;margin-top:16px">' +
        '<button class="btn btn-green" onclick="saveEdit(\'' + id + '\')">💾 Saqlash</button>' +
        '<button class="btn btn-gray" onclick="closeEdit()">Bekor qilish</button>' +
      '</div>' +
    '</div>';
 
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
 
window.updateCorrectBox = function() {
  for (var i = 0; i < 4; i++) {
    var box = document.getElementById('optBox' + i);
    if (box) box.className = 'option-box';
  }
  var checked = document.querySelector('input[name="editCorrect"]:checked');
  if (checked) {
    var box = document.getElementById('optBox' + checked.value);
    if (box) box.className = 'option-box correct-box';
  }
};
 
window.saveEdit = async function(id) {
  setStatus('editStatus', '⏳ Saqlanmoqda...', 'loading');
 
  var correctEl = document.querySelector('input[name="editCorrect"]:checked');
  if (!correctEl) { setStatus('editStatus', '❌ To\'g\'ri javobni tanlang!', 'error'); return; }
 
  var opts = [];
  var item = allQuestions.find(q => q.id === id);
  for (var i = 0; i < 4; i++) {
    var oldOpt = (item && item.options && item.options[i]) || {};
    opts.push({
      text: document.getElementById('editOpt' + i).value.trim() || null,
      fontSize: oldOpt.fontSize || 18,
      audioUrl: oldOpt.audioUrl || null,
      imageUrl: oldOpt.imageUrl || null,
    });
  }
 
  try {
    await updateDoc(doc(db, 'questions', id), {
      section: document.getElementById('editSection').value,
      testType: document.getElementById('editTestType').value,
      difficulty: document.getElementById('editDiff').value,
      purpose: document.getElementById('editPurpose').value.trim() || null,
      questionText: document.getElementById('editQText').value.trim() || null,
      correctIndex: parseInt(correctEl.value),
      options: opts,
    });
 
    // Local update
    var idx = allQuestions.findIndex(q => q.id === id);
    if (idx !== -1) {
      allQuestions[idx].section = document.getElementById('editSection').value;
      allQuestions[idx].testType = document.getElementById('editTestType').value;
      allQuestions[idx].difficulty = document.getElementById('editDiff').value;
      allQuestions[idx].purpose = document.getElementById('editPurpose').value.trim() || null;
      allQuestions[idx].questionText = document.getElementById('editQText').value.trim() || null;
      allQuestions[idx].correctIndex = parseInt(correctEl.value);
      allQuestions[idx].options = opts;
    }
 
    setStatus('editStatus', '✅ Muvaffaqiyatli saqlandi!', 'success');
    onSearch();
  } catch(e) {
    setStatus('editStatus', '❌ Xato: ' + e.message, 'error');
  }
};
 
window.closeEdit = function() {
  selectedId = null;
  document.getElementById('editPanel').style.display = 'none';
  onSearch();
};
 
// ══════════════ LAST QUESTION ══════════════
window.loadLast = async function() {
  setStatus('lastStatus', '⏳ Yuklanmoqda...', 'loading');
  document.getElementById('lastResult').innerHTML = '';
  try {
    var sec = document.getElementById('lastSection').value;
    var q;
    if (sec) {
      q = query(collection(db, 'questions'), where('section', '==', sec), orderBy('createdAt', 'desc'), limit(1));
    } else {
      q = query(collection(db, 'questions'), orderBy('createdAt', 'desc'), limit(1));
    }
    var snap = await getDocs(q);
    if (snap.empty) { setStatus('lastStatus', '😕 Savol topilmadi', 'error'); return; }
    var d = snap.docs[0].data();
    var id = snap.docs[0].id;
    setStatus('lastStatus', '✅ Eng so\'nggi savol yuklandi!', 'success');
    renderLastQuestion(d, id);
  } catch(e) {
    setStatus('lastStatus', '❌ Xato: ' + e.message, 'error');
  }
};
 
function renderLastQuestion(d, id) {
  var html = '<div class="card">';
  html += '<div class="card-header">🆔 ' + id + '</div>';
  html += '<div class="card-body">';
 
  html += '<div class="q-meta" style="margin-bottom:12px">';
  html += '<span class="badge badge-blue">' + (d.section||'?') + '</span>';
  html += '<span class="badge ' + (d.testType==='Listening'?'badge-green':'badge-purple') + '">' + (d.testType||'⚠️ testType YO\'Q') + '</span>';
  html += '<span class="badge badge-orange">' + (d.difficulty||'?') + '</span>';
  html += '</div>';
 
  html += '<div class="section-lbl">📌 Savol maqsadi</div>';
  html += d.purpose ? '<div class="detail-box">' + d.purpose + '</div>' : '<span class="null-tag">null</span>';
 
  html += '<div class="section-lbl">❓ Savol matni</div>';
  html += d.questionText ? '<div class="detail-box">' + d.questionText + '</div>' : '<span class="null-tag">null</span>';
 
  html += '<div class="section-lbl">🎧 Audio</div>';
  if (d.questionAudioUrl) {
    html += '<div class="ok-tag">✅ URL bor</div>';
    html += '<audio controls src="' + d.questionAudioUrl + '" style="width:100%;margin-top:6px"></audio>';
  } else { html += '<span class="null-tag">null</span>'; }
 
  html += '<div class="section-lbl">🖼 Rasm</div>';
  if (d.questionImageUrl) {
    html += '<img src="' + d.questionImageUrl + '" style="max-width:100%;max-height:200px;border-radius:8px;margin-top:6px"/>';
  } else { html += '<span class="null-tag">null</span>'; }
 
  html += '<div class="section-lbl">📋 Variantlar</div>';
  if (d.options) {
    d.options.forEach(function(opt, i) {
      var isC = i === d.correctIndex;
      html += '<div style="background:#0d0f14;border:1.5px solid ' + (isC?'#27ae60':'#2a3045') + ';border-radius:8px;padding:10px;margin-bottom:8px">';
      html += '<span style="color:#4f8ef7;font-weight:800">' + (i+1) + (isC?' ✅':'') + '</span> ';
      html += opt.text ? '<span>' + opt.text + '</span>' : '<span class="null-tag">matn null</span>';
      if (opt.audioUrl) html += '<div class="ok-tag" style="margin-top:4px">🎧 Audio bor</div><audio controls src="' + opt.audioUrl + '" style="width:100%;margin-top:4px"></audio>';
      if (opt.imageUrl) html += '<img src="' + opt.imageUrl + '" style="max-width:100%;max-height:100px;border-radius:6px;margin-top:4px"/>';
      html += '</div>';
    });
  }
 
  html += '</div></div>';
  document.getElementById('lastResult').innerHTML = html;
}
 
// ══════════════ STATS ══════════════
window.loadStats = async function() {
  setStatus('statsStatus', '⏳ Yuklanmoqda...', 'loading');
  document.getElementById('statsResult').innerHTML = '';
  try {
    var snap = await getDocs(collection(db, 'questions'));
    var total = snap.size;
    var bySection = {}, byType = {Listening:0, Reading:0, noType:0}, byDiff = {};
 
    snap.docs.forEach(function(d) {
      var data = d.data();
      bySection[data.section] = (bySection[data.section]||0) + 1;
      if (data.testType === 'Listening') byType.Listening++;
      else if (data.testType === 'Reading') byType.Reading++;
      else byType.noType++;
      byDiff[data.difficulty] = (byDiff[data.difficulty]||0) + 1;
    });
 
    var html = '<div class="stat-grid" style="margin-bottom:20px">';
    html += statCard(total, 'Jami savollar', '#e8eaf0');
    html += statCard(byType.Listening, '🎧 Listening', '#2ecc71');
    html += statCard(byType.Reading, '📖 Reading', '#7c5cfc');
    html += statCard(byType.noType, '⚠️ Type yo\'q', byType.noType > 0 ? '#e74c3c' : '#2ecc71');
    html += '</div>';
 
    html += '<div class="card-header" style="border-radius:10px 10px 0 0;background:#1e2330;padding:10px 14px;font-size:12px;font-weight:700">Bo\'lim bo\'yicha</div>';
    html += '<div class="stat-grid" style="margin-bottom:20px;background:#161a23;border:1px solid #2a3045;border-top:none;border-radius:0 0 10px 10px;padding:12px;gap:10px">';
    Object.keys(bySection).forEach(function(k) {
      html += statCard(bySection[k], k, '#4f8ef7');
    });
    html += '</div>';
 
    html += '<div class="card-header" style="border-radius:10px 10px 0 0;background:#1e2330;padding:10px 14px;font-size:12px;font-weight:700">Qiyinlik bo\'yicha</div>';
    html += '<div class="stat-grid" style="background:#161a23;border:1px solid #2a3045;border-top:none;border-radius:0 0 10px 10px;padding:12px;gap:10px">';
    ['Very Easy','Easy','Medium','Above Medium','Hard'].forEach(function(k) {
      var colors = {'Very Easy':'#27ae60','Easy':'#2ecc71','Medium':'#f1c40f','Above Medium':'#e67e22','Hard':'#e74c3c'};
      html += statCard(byDiff[k]||0, k, colors[k]);
    });
    html += '</div>';
 
    document.getElementById('statsResult').innerHTML = html;
    setStatus('statsStatus', '✅ Statistika tayyor!', 'success');
  } catch(e) {
    setStatus('statsStatus', '❌ Xato: ' + e.message, 'error');
  }
};
 
function statCard(num, label, color) {
  return '<div class="stat-card"><div class="stat-num" style="color:' + color + '">' + num + '</div><div class="stat-label">' + label + '</div></div>';
}
 
function setStatus(id, msg, type) {
  var el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'status ' + type;
}
</script>
</body>
</html>
