<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Manager Panel | Toʻliq boshqaruv</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Sora:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0d0f14;--surface:#161a23;--surface2:#1e2330;--border:#2a3045;--accent:#4f8ef7;--accent2:#7c5cfc;--green:#2ecc71;--red:#e74c3c;--yellow:#f1c40f;--text:#e8eaf0;--muted:#6b7280;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;min-height:100vh;padding-bottom:60px}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
h1{font-size:15px;font-weight:800;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tabs{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.tab{padding:7px 14px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:'Sora',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s}
.tab:hover{border-color:var(--accent);color:var(--accent)}
.tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff}
.page{display:none;max-width:960px;margin:0 auto;padding:24px 20px}
.page.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.card-title{font-size:14px;font-weight:800;margin-bottom:16px}
input,textarea,select{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'Sora',sans-serif;font-size:13px;padding:9px 12px;outline:none;width:100%;transition:border-color 0.2s}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:60px}
.field{margin-bottom:12px}
.field label{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;display:block;margin-bottom:5px}
.row{display:flex;gap:10px}
.row>*{flex:1}
.btn{padding:9px 18px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:'Sora',sans-serif}
.btn-blue{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-green{background:#27ae60;color:#fff}
.btn-red{background:#c0392b;color:#fff}
.btn-gray{background:var(--surface2);color:var(--text)}
.btn:hover{opacity:0.85;transform:translateY(-1px)}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;font-family:'IBM Plex Mono',monospace}
.bb{background:rgba(79,142,247,0.15);color:var(--accent)}
.bg{background:rgba(39,174,96,0.15);color:var(--green)}
.bp{background:rgba(124,92,252,0.15);color:var(--accent2)}
.bo{background:rgba(230,126,34,0.15);color:#e67e22}
.br{background:rgba(231,76,60,0.15);color:var(--red)}
.bx{background:rgba(107,114,128,0.15);color:var(--muted)}
.bl{background:rgba(21,101,192,0.15);color:#1565C0}
.search-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-bar input{flex:1;min-width:200px}
.search-bar select{width:auto;min-width:120px;flex:0;font-family:'IBM Plex Mono',monospace;font-size:12px}
.pagination-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px;background:var(--surface2);border-radius:12px;padding:10px 16px;border:1px solid var(--border)}
.rows-selector{display:flex;align-items:center;gap:10px;font-size:13px;font-family:'IBM Plex Mono',monospace}
.rows-selector select{width:auto;padding:6px 12px;font-size:13px}
.pagination-buttons{display:flex;gap:10px;align-items:center}
.pagination-buttons button{padding:6px 12px;font-size:12px}
.page-info{font-size:12px;color:var(--muted);font-family:'IBM Plex Mono',monospace}
.q-list{display:flex;flex-direction:column;gap:8px}
.q-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all 0.2s}
.q-item:hover,.q-item.selected{border-color:var(--accent);background:var(--surface2)}
.q-item.group-first{border-left:3px solid var(--accent)}
.q-item.group-other{border-left:3px solid rgba(79,142,247,0.3);margin-left:16px}
.q-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.q-purpose{font-size:13px;color:var(--text);line-height:1.5}
.q-sub{font-size:11px;color:var(--muted);margin-top:3px;font-family:'IBM Plex Mono',monospace}
.edit-panel{background:var(--surface);border:1.5px solid var(--accent);border-radius:14px;padding:20px;margin-top:16px}
.edit-title{font-size:15px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.option-box{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:12px;transition:border-color 0.2s}
.option-box.correct-box{border-color:var(--green)}
.option-label{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;font-family:'IBM Plex Mono',monospace}
.correct-radio{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);cursor:pointer}
.correct-radio input{width:auto;accent-color:var(--green)}
.upload-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;background:var(--surface2);border:1.5px dashed var(--border);border-radius:8px;color:var(--muted);font-size:12px;font-family:'IBM Plex Mono',monospace;cursor:pointer;position:relative;overflow:hidden;transition:all 0.2s;margin-top:6px}
.upload-btn:hover{border-color:var(--accent);color:var(--accent)}
.upload-btn input[type=file]{position:absolute;opacity:0;width:100%;height:100%;top:0;left:0;cursor:pointer}
.file-status{font-size:11px;margin-top:4px;font-family:'IBM Plex Mono',monospace}
.has-file{color:var(--green)}
.no-file{color:var(--muted)}
.preview-img{max-width:100%;max-height:120px;border-radius:8px;margin-top:6px;display:none}
.status{padding:10px 14px;border-radius:8px;font-size:13px;font-weight:600;margin-bottom:14px;display:none}
.status.success{background:rgba(39,174,96,0.1);border:1px solid rgba(39,174,96,0.3);color:var(--green);display:block}
.status.error{background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.3);color:var(--red);display:block}
.status.loading{background:rgba(241,196,15,0.1);color:var(--yellow);display:block}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat-num{font-size:28px;font-weight:900;font-family:'IBM Plex Mono',monospace}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:4px}
.spinner{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.group-info{background:rgba(79,142,247,0.06);border:1.5px solid rgba(79,142,247,0.25);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--accent)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:0.5px;padding:8px 10px;text-align:left;font-family:'IBM Plex Mono',monospace;border-bottom:1px solid var(--border)}
td{padding:10px;border-bottom:1px solid rgba(42,48,69,0.5)}
tr:hover td{background:var(--surface2)}
.mini-btn{padding:4px 10px;border-radius:6px;border:1.5px solid;background:transparent;font-size:11px;cursor:pointer;font-family:'Sora',sans-serif;font-weight:700}
.mini-btn:hover{opacity:0.7}
@media(max-width:600px){.options-grid{grid-template-columns:1fr}.row{flex-direction:column}}
</style>
</head>
<body>
<header>
  <div class="logo">🇰🇷</div>
  <h1>Savol Boshqaruv Paneli</h1>
  <div style="margin-left:8px;background:rgba(79,142,247,0.1);border:1.5px solid var(--border);border-radius:8px;padding:6px 14px;display:flex;align-items:center;gap:8px;font-size:12px;font-family:'IBM Plex Mono',monospace"><span style="color:var(--muted)">👥</span><span style="color:var(--text);font-weight:700" id="headerUserCount">—</span><span style="color:var(--muted)">foydalanuvchi</span></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('search',this)">🔎 Qidirish</button>
    <button class="tab" onclick="switchTab('last',this)">📥 So'nggi</button>
    <button class="tab" onclick="switchTab('stats',this)">📊 Statistika</button>
    <button class="tab" onclick="switchTab('leaderboard',this)">🏆 Leaderboard</button>
    <button class="tab" onclick="switchTab('users',this)">👥 Foydalanuvchilar</button>
  </div>
</header>

<!-- SEARCH with pagination -->
<div id="tab-search" class="page active">
  <div id="searchStatus" class="status"></div>
  <div class="search-bar">
    <input id="searchInput" placeholder="Qidirish..." oninput="onSearch()"/>
    <select id="filterSection" onchange="onSearch()">
      <option value="">Barcha bo'lim</option>
      <option>EPS TOPIK</option><option>TOPIK 1</option><option>TOPIK 2</option>
    </select>
    <select id="filterType" onchange="onSearch()">
      <option value="">Barcha tur</option>
      <option value="Reading">📖 Reading</option>
      <option value="Listening">🎧 Listening</option>
    </select>
    <select id="filterDiff" onchange="onSearch()">
      <option value="">Barcha qiyinlik</option>
      <option>Very Easy</option><option>Easy</option><option>Medium</option>
      <option>Above Medium</option><option>Hard</option>
    </select>
    <select id="filterGroup" onchange="onSearch()">
      <option value="">Barchasi</option>
      <option value="group">Guruh</option>
      <option value="single">Oddiy</option>
    </select>
    <button class="btn btn-blue" onclick="loadAll()">🔄 Yuklash</button>
  </div>
  
  <!-- PAGINATION & ROWS SELECTOR -->
  <div class="pagination-bar">
    <div class="rows-selector">
      <span>📄 Qatorlar:</span>
      <select id="rowsPerPageSelect">
        <option value="25">25</option>
        <option value="50" selected>50</option>
        <option value="100">100</option>
        <option value="200">200</option>
        <option value="300">300</option>
        <option value="400">400</option>
      </select>
    </div>
    <div class="pagination-buttons">
      <button id="prevPageBtn" class="btn btn-gray" disabled>◀ Oldingi</button>
      <span id="pageInfo" class="page-info">1-bet</span>
      <button id="nextPageBtn" class="btn btn-gray" disabled>Keyingi ▶</button>
    </div>
  </div>
  
  <div id="qList" class="q-list"><div class="spinner">🔄 Yuklash tugmasini bosing</div></div>
  <div id="editPanel" style="display:none"></div>
</div>

<!-- LAST (unchanged) -->
<div id="tab-last" class="page">
  <div id="lastStatus" class="status"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start">
    <div><div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:10px;font-family:'IBM Plex Mono',monospace">So'nggi 50 ta savol</div><div id="lastList" class="q-list"><div class="spinner">⏳ Tab ochilganda yuklanadi</div></div></div>
    <div><div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:10px;font-family:'IBM Plex Mono',monospace">Tahrirlash</div><div id="lastEditPanel" style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px"><div style="color:var(--muted);font-size:13px;text-align:center;padding:40px 0">Chap tomondagi savolni bosing</div></div></div>
  </div>
</div>

<!-- STATS -->
<div id="tab-stats" class="page">
  <div id="statsStatus" class="status"></div>
  <div style="margin-bottom:16px"><button class="btn btn-blue" onclick="loadStats()">📊 Yuklash</button></div>
  <div id="statsResult"></div>
  <div style="margin-top:20px"><button class="btn btn-blue" onclick="findDuplicates()" style="margin-bottom:12px">🔍 Bir xil rasmi/audiosi bor savollarni top</button><div id="dupStatus" style="font-size:12px;color:var(--muted);margin-bottom:8px;font-family:'IBM Plex Mono',monospace"></div><div id="dupList"></div></div>
</div>

<!-- LEADERBOARD -->
<div id="tab-leaderboard" class="page">
  <div class="card"><div class="card-title">🏆 Leaderboard</div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px"><select id="lbSection" style="flex:0;min-width:150px"><option value="EPS_TOPIK">📋 EPS TOPIK</option><option value="TOPIK_1">📗 TOPIK 1</option><option value="TOPIK_2">📘 TOPIK 2</option></select><select id="lbPeriod" style="flex:0;min-width:140px"><option value="weekly">Haftalik</option><option value="monthly">Oylik</option><option value="lastmonth">O'tgan oy</option></select><button class="btn btn-blue" onclick="loadLeaderboard()" style="flex:0">Yuklash</button></div><div id="lbStatus" style="font-size:12px;color:var(--muted);margin-bottom:10px;font-family:'IBM Plex Mono',monospace"></div><div id="lbList"></div></div>
</div>

<!-- USERS -->
<div id="tab-users" class="page">
  <div class="card"><div class="card-title">👥 Foydalanuvchilar</div><div style="display:flex;gap:8px;margin-bottom:12px"><input id="userSearch" placeholder="Ism yoki #tag..." onkeydown="if(event.key==='Enter')searchUsers()"/><button class="btn btn-blue" onclick="searchUsers()" style="flex:0;min-width:70px">🔍</button></div><div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap"><div class="stat-card" style="flex:1;min-width:120px"><div class="stat-num" id="totalUsers" style="color:var(--accent)">—</div><div class="stat-lbl">Jami foydalanuvchi</div></div><div class="stat-card" style="flex:1;min-width:120px"><div class="stat-num" id="blockedUsers" style="color:var(--red)">—</div><div class="stat-lbl">Bloklangan</div></div><div class="stat-card" style="flex:1;min-width:120px"><div class="stat-num" id="activeUsers" style="color:var(--green)">—</div><div class="stat-lbl">Faol</div></div></div><div id="userStatus" style="font-size:12px;color:var(--muted);margin-bottom:10px;font-family:'IBM Plex Mono',monospace"></div><div id="userList"></div></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyAOgwoxezdtV89KTdapbVHqzYjjt61_Cfk",
  authDomain:"koreantestapp.firebaseapp.com",
  projectId:"koreantestapp",
  storageBucket:"koreantestapp.firebasestorage.app",
  messagingSenderId:"927061643427",
  appId:"1:927061643427:web:89338d7127243e38ed6f16"
});
var db=firebase.firestore();
var storage=firebase.storage();
var allQuestions=[];
var lastItems=[];
var newFiles={qAudio:null,qImage:null,opt:[null,null,null,null],optImg:[null,null,null,null]};

// PAGINATION GLOBALS (faqat search uchun)
let filteredQuestions = [];       // filtr natijasi (guruhlangan tartibda)
let currentPage = 1;
let rowsPerPage = 50;            // default

function switchTab(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(btn) btn.classList.add('active');
  if(name==='last') loadLast();
  if(name==='leaderboard') loadLeaderboard();
}
function setStatus(id,msg,type){
  var el=document.getElementById(id);
  if(el){el.textContent=msg;el.className='status '+type;}
}
function showFS(id,msg,ok){
  var el=document.getElementById(id);
  if(el){el.textContent=msg;el.className='file-status '+(ok?'has-file':'no-file');}
}
function diffBadge(d){var m={'Very Easy':'bg','Easy':'bg','Medium':'bo','Above Medium':'br','Above Medium Hard':'bp','Hard':'br','Hard Hard':'bx'};return '<span class="badge '+(m[d]||'bx')+'">'+d+'</span>'}
function typeBadge(t){return '<span class="badge '+(t==='Listening'?'bl':'bb')+'">'+t+'</span>'}
function secBadge(s){return '<span class="badge bp">'+s+'</span>'}

// ---------- SEARCH PAGINATION LOGIC ----------
function applyFiltersAndRender() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const sec = document.getElementById('filterSection').value;
  const type = document.getElementById('filterType').value;
  const diff = document.getElementById('filterDiff').value;
  const grp = document.getElementById('filterGroup').value;
  
  let rawFiltered = allQuestions.filter(item => {
    if(sec && item.section!==sec) return false;
    if(type && item.testType!==type) return false;
    if(diff && item.difficulty!==diff) return false;
    if(grp==='group' && !item.groupId) return false;
    if(grp==='single' && item.groupId) return false;
    if(q){ let txt=(item.purpose||'')+(item.questionText||''); if(txt.toLowerCase().indexOf(q)===-1) return false; }
    return true;
  });
  
  // Guruhlash va tartiblash (originaldagi kabi)
  let groupedMap={}, singles=[];
  rawFiltered.forEach(item=>{
    if(item.groupId){
      if(!groupedMap[item.groupId]) groupedMap[item.groupId]=[];
      groupedMap[item.groupId].push(item);
    } else singles.push(item);
  });
  let finalSorted=[];
  Object.values(groupedMap).forEach(arr=>{
    arr.sort((a,b)=>(a.groupOrder||0)-(b.groupOrder||0));
    arr.forEach(i=>finalSorted.push(i));
  });
  singles.forEach(i=>finalSorted.push(i));
  
  filteredQuestions = finalSorted;
  currentPage = 1;
  renderPaginatedList();
}

function renderPaginatedList() {
  const total = filteredQuestions.length;
  const totalPages = Math.ceil(total / rowsPerPage) || 1;
  if(currentPage > totalPages) currentPage = totalPages;
  if(currentPage < 1) currentPage = 1;
  const start = (currentPage-1) * rowsPerPage;
  const end = Math.min(start + rowsPerPage, total);
  const pageItems = filteredQuestions.slice(start, end);
  
  const listContainer = document.getElementById('qList');
  if(!pageItems.length && total===0){
    listContainer.innerHTML='<div class="spinner">🔍 Natija topilmadi</div>';
    document.getElementById('pageInfo').innerText=`0 bet`;
    document.getElementById('prevPageBtn').disabled=true;
    document.getElementById('nextPageBtn').disabled=true;
    return;
  }
  
  // HTML generatsiya
  let html = '';
  pageItems.forEach(item => {
    const ig = !!item.groupId;
    const ord = item.groupOrder || 1;
    const cls = 'q-item' + (ig ? (ord===1 ? ' group-first' : ' group-other') : '');
    html += `<div class="${cls}" onclick="selectQ('${item._id}',event)">
      <div class="q-meta">${secBadge(item.section)}${typeBadge(item.testType||'Reading')}${diffBadge(item.difficulty||'Easy')}
      ${ig ? `<span class="badge bb">🔗 ${ord}/2</span>` : ''}
      </div><div class="q-purpose">${escapeHtml(item.purpose || item.questionText || '—')}</div>
      <div class="q-sub">${item._id}</div></div>`;
  });
  listContainer.innerHTML = html;
  
  // Pagination UI update
  const pageInfoSpan = document.getElementById('pageInfo');
  pageInfoSpan.innerText = `${currentPage} / ${totalPages} bet (${total} ta)`;
  const prevBtn = document.getElementById('prevPageBtn');
  const nextBtn = document.getElementById('nextPageBtn');
  prevBtn.disabled = (currentPage === 1);
  nextBtn.disabled = (currentPage === totalPages);
}

function goPrevPage() { if(currentPage > 1){ currentPage--; renderPaginatedList(); } }
function goNextPage() { const totalPages = Math.ceil(filteredQuestions.length / rowsPerPage); if(currentPage < totalPages){ currentPage++; renderPaginatedList(); } }
function changeRowsPerPage() {
  rowsPerPage = parseInt(document.getElementById('rowsPerPageSelect').value);
  currentPage = 1;
  renderPaginatedList();
}

function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

// Override onSearch
function onSearch() { applyFiltersAndRender(); }

// Yuklash (loadAll) yangi ma'lumotlarni olib, filter va paginationni yangilaydi
function loadAll(){
  setStatus('searchStatus','⏳ Yuklanmoqda...','loading');
  document.getElementById('qList').innerHTML='<div class="spinner">⏳ Yuklanmoqda...</div>';
  document.getElementById('editPanel').style.display='none';
  db.collection('questions').get().then(snap=>{
    allQuestions=snap.docs.map(d=>{let data=d.data(); data._id=d.id; return data;});
    setStatus('searchStatus','✅ '+allQuestions.length+' ta savol yuklandi!','success');
    applyFiltersAndRender();  // filtr va paginatsiya
  }).catch(e=>setStatus('searchStatus','❌ Xato: '+e.message,'error'));
}

// selectQ va saveEdit o'zgarishsiz (faqat ID orqali ishlaydi)
function selectQ(id, e){
  document.querySelectorAll('.q-item').forEach(el=>el.classList.remove('selected'));
  if(e && e.currentTarget) e.currentTarget.classList.add('selected');
  let item=allQuestions.find(q=>q._id===id);
  if(!item) return;
  newFiles={qAudio:null,qImage:null,opt:[null,null,null,null],optImg:[null,null,null,null]};
  let opts=item.options||[];
  let gi=item.groupId?'<div class="group-info">🔗 Guruh: '+item.groupId+' | Tartib: '+item.groupOrder+'</div>':'';
  let oh='<div class="options-grid">';
  for(let i=0;i<4;i++){
    let opt=opts[i]||{}; let isC=item.correctIndex===i;
    oh+='<div class="option-box'+(isC?' correct-box':'')+'" id="ob'+i+'">';
    oh+='<div class="option-label">'+['①','②','③','④'][i]+
      '<label class="correct-radio"><input type="radio" name="ec" value="'+i+'"'+(isC?' checked':'')+' onchange="markCB('+i+')"> To\'g\'ri</label></div>';
    oh+='<textarea id="eO'+i+'" style="min-height:44px">'+(opt.text||'')+'</textarea>';
    oh+='<label class="upload-btn">🎧 Audio<input type="file" accept="audio/*" onchange="onEF(\'oa\','+i+',this)"></label>';
    oh+='<span class="file-status" id="oas'+i+'">'+(opt.audioUrl?'✅ Mavjud':'—')+'</span>';
    oh+='<label class="upload-btn">🖼 Rasm<input type="file" accept="image/*" onchange="onEF(\'oi\','+i+',this)"></label>';
    oh+='<span class="file-status" id="ois'+i+'">'+(opt.imageUrl?'✅ Mavjud':'—')+'</span>';
    oh+='</div>';
  }
  oh+='</div>';
  let ep=document.getElementById('editPanel');
  ep.style.display='block';
  ep.innerHTML='<div class="edit-panel"><div class="edit-title">✏️ Tahrirlash <button class="btn btn-red" onclick="deleteQ(\''+id+'\')">🗑 O\'chirish</button></div>'+gi+
    '<div class="field"><label>Savol maqsadi</label><textarea id="eP">'+(item.purpose||'')+'</textarea></div>'+
    '<div class="field"><label>Savol matni</label><textarea id="eQ">'+(item.questionText||'')+'</textarea></div>'+
    '<div class="field"><label>Audio</label><label class="upload-btn">🎧 Yangi audio<input type="file" accept="audio/*" onchange="onEF(\'qa\',0,this)"></label>'+
    '<span class="file-status" id="eqas">'+(item.questionAudioUrl?'✅ Mavjud':'—')+'</span></div>'+
    '<div class="field"><label>Rasm</label><label class="upload-btn">🖼 Yangi rasm<input type="file" accept="image/*" onchange="onEF(\'qi\',0,this)"></label>'+
    '<span class="file-status" id="eqis">'+(item.questionImageUrl?'✅ Mavjud':'—')+'</span>'+
    (item.questionImageUrl?'<img src="'+item.questionImageUrl+'" style="max-height:80px;margin-top:6px;border-radius:6px">':'')+'</div>'+
    oh+'<div id="ess" class="status" style="margin-top:12px"></div><button class="btn btn-green" onclick="saveEdit(\''+id+'\')" style="margin-top:12px;width:100%">💾 Saqlash</button></div>';
}
function markCB(i){ for(let j=0;j<4;j++){ let b=document.getElementById('ob'+j); if(b) b.className='option-box'+(j===i?' correct-box':''); } }
function onEF(type,idx,input){
  let file=input.files[0]; if(!file) return;
  if(type==='qa'){ newFiles.qAudio=file; showFS('eqas','🎧 '+file.name,true); }
  else if(type==='qi'){ newFiles.qImage=file; showFS('eqis','🖼 '+file.name,true); }
  else if(type==='oa'){ newFiles.opt[idx]=file; showFS('oas'+idx,'🎧 '+file.name,true); }
  else if(type==='oi'){ newFiles.optImg[idx]=file; showFS('ois'+idx,'🖼 '+file.name,true); }
}
async function saveEdit(id){
  setStatus('ess','⏳ Saqlanmoqda...','loading');
  let item=allQuestions.find(q=>q._id===id); if(!item) return;
  let update={};
  update.purpose=document.getElementById('eP').value.trim()||null;
  update.questionText=document.getElementById('eQ').value.trim()||null;
  let ce=document.querySelector('input[name="ec"]:checked');
  if(ce) update.correctIndex=parseInt(ce.value);
  if(newFiles.qAudio) update.questionAudioUrl=await uploadFile(newFiles.qAudio,'audio');
  if(newFiles.qImage) update.questionImageUrl=await uploadFile(newFiles.qImage,'images');
  if(item.groupId&&(newFiles.qAudio||newFiles.qImage)){
    allQuestions.filter(q=>q.groupId===item.groupId&&q._id!==id).forEach(sib=>{
      let su={};
      if(newFiles.qAudio&&update.questionAudioUrl) su.questionAudioUrl=update.questionAudioUrl;
      if(newFiles.qImage&&update.questionImageUrl) su.questionImageUrl=update.questionImageUrl;
      if(Object.keys(su).length) db.collection('questions').doc(sib._id).update(su);
    });
  }
  let opts=item.options?JSON.parse(JSON.stringify(item.options)):Array(4).fill({});
  for(let i=0;i<4;i++){
    if(!opts[i]) opts[i]={};
    opts[i].text=document.getElementById('eO'+i).value.trim();
    if(newFiles.opt[i]) opts[i].audioUrl=await uploadFile(newFiles.opt[i],'audio');
    if(newFiles.optImg[i]) opts[i].imageUrl=await uploadFile(newFiles.optImg[i],'images');
  }
  update.options=opts;
  db.collection('questions').doc(id).update(update).then(()=>{ setStatus('ess','✅ Saqlandi!','success'); loadAll(); }).catch(e=>setStatus('ess','❌ Xato: '+e.message,'error'));
}
async function uploadFile(file,path){
  if(!file) return null;
  let ext=file.name.split(".").pop()||"bin";
  let uid=Date.now()+"_"+Math.random().toString(36).substring(2,8)+"."+ext;
  let ref=storage.ref(path+"/"+uid);
  await ref.put(file);
  return await ref.getDownloadURL();
}
function deleteQ(id){
  if(!confirm('Rostdan o\'chirasizmi?')) return;
  db.collection('questions').doc(id).delete().then(()=>{ document.getElementById('editPanel').style.display='none'; loadAll(); });
}

// LAST tab functions (unchanged)
function loadLast(){
  let el=document.getElementById('lastList');
  el.innerHTML='<div class="spinner">⏳ Yuklanmoqda...</div>';
  db.collection('questions').orderBy('createdAt','desc').limit(50).get().then(snap=>{
    if(snap.empty){ el.innerHTML='<div class="spinner">Bo\'sh</div>'; return; }
    let items=snap.docs.map(d=>{let data=d.data(); data._id=d.id; return data;});
    let sorted=[]; let seen={};
    items.forEach(item=>{
      if(item.groupId){
        if(!seen[item.groupId]){
          seen[item.groupId]=true;
          items.filter(q=>q.groupId===item.groupId).sort((a,b)=>(a.groupOrder||0)-(b.groupOrder||0)).forEach(q=>sorted.push(q));
        }
      } else sorted.push(item);
    });
    lastItems=sorted;
    el.innerHTML=sorted.map(item=>{
      let ig=!!item.groupId; let ord=item.groupOrder||1;
      let cls='q-item'+(ig?(ord===1?' group-first':' group-other'):'');
      return `<div class="${cls}" id="lq_${item._id}"><div class="q-meta" style="justify-content:space-between;align-items:center"><div style="display:flex;gap:6px;flex-wrap:wrap">${secBadge(item.section)}${typeBadge(item.testType||'Reading')}${diffBadge(item.difficulty||'Easy')}${ig?'<span class="badge bb">🔗 '+ord+'/2</span>':''}</div><button class="last-edit-btn" data-id="${item._id}" style="padding:3px 10px;border-radius:6px;border:1.5px solid var(--accent);background:transparent;color:var(--accent);font-size:11px;cursor:pointer;font-family:Sora,sans-serif;font-weight:700">✏️ Tahrir</button></div><div class="q-purpose">${item.purpose||item.questionText||'—'}</div></div>`;
    }).join('');
    el.querySelectorAll('.last-edit-btn').forEach(btn=>btn.addEventListener('click',e=>{ e.stopPropagation(); selectLastQ(btn.getAttribute('data-id')); }));
    el.querySelectorAll('.q-item').forEach(card=>{ card.addEventListener('click',e=>{ if(e.target.classList.contains('last-edit-btn')) return; let btn=card.querySelector('.last-edit-btn'); if(btn) selectLastQ(btn.getAttribute('data-id')); }); });
  }).catch(e=>el.innerHTML='<div class="spinner">❌ '+e.message+'</div>');
}
function selectLastQ(id){
  document.querySelectorAll("#lastList .q-item").forEach(el=>el.classList.remove("selected"));
  let selEl=document.getElementById("lq_"+id); if(selEl) selEl.classList.add("selected");
  let ep=document.getElementById("lastEditPanel");
  ep.innerHTML="<div style='color:var(--muted);font-size:13px;text-align:center;padding:20px'>⏳ Yuklanmoqda...</div>";
  db.collection("questions").doc(id).get().then(doc=>{
    if(!doc.exists){ ep.innerHTML="<div style='color:var(--red);padding:16px'>Savol topilmadi</div>"; return; }
    let item=doc.data(); item._id=doc.id;
    let idx=lastItems.findIndex(q=>q._id===id); if(idx!==-1) lastItems[idx]=item;
    buildEditPanel(ep, id, item);
  }).catch(e=>ep.innerHTML="<div style='color:var(--red);padding:16px'>Xato: "+e.message+"</div>");
}

// stats/leaderboard funksiyalar (original)
window.loadStats = function(){
  setStatus('statsStatus','⏳ Yuklanmoqda...','loading');
  db.collection('questions').get().then(snap=>{
    let all=snap.docs.map(d=>d.data());
    let byS={},byT={},byD={}, gids=new Set();
    all.forEach(item=>{ byS[item.section]=(byS[item.section]||0)+1; byT[item.testType]=(byT[item.testType]||0)+1; byD[item.difficulty]=(byD[item.difficulty]||0)+1; if(item.groupId&&item.groupOrder===1) gids.add(item.groupId); });
    function sc(n,l,c){ return '<div class="stat-card"><div class="stat-num" style="color:'+c+'">'+n+'</div><div class="stat-lbl">'+l+'</div></div>'; }
    let html='<div class="stat-grid">'+sc(all.length,'Jami savol','var(--accent)')+sc(byS['EPS TOPIK']||0,'EPS TOPIK','var(--accent2)')+sc(byS['TOPIK 1']||0,'TOPIK 1','var(--green)')+sc(byS['TOPIK 2']||0,'TOPIK 2','var(--yellow)')+sc(byT['Listening']||0,'Listening','var(--accent)')+sc(byT['Reading']||0,'Reading','var(--accent2)')+sc(gids.size,'Guruh juftligi','#e67e22')+'</div>';
    html+='<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;margin:12px 0 6px;font-family:IBM Plex Mono,monospace">QIYINLIK</div><div class="stat-grid">';
    let dc={'Very Easy':'#27ae60','Easy':'var(--green)','Medium':'var(--yellow)','Above Medium':'#e67e22','Hard':'var(--red)'};
    ['Very Easy','Easy','Medium','Above Medium','Hard'].forEach(k=>html+=sc(byD[k]||0,k,dc[k]));
    html+='</div>'; document.getElementById('statsResult').innerHTML=html; setStatus('statsStatus','✅ Tayyor!','success');
  }).catch(e=>setStatus('statsStatus','❌ Xato: '+e.message,'error'));
};
