<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<title>Savol Boshqaruv Paneli</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d0f14; color: #e8eaf0; font-family: sans-serif; }
.header { background: #161a23; border-bottom: 1px solid #2a3045; padding: 14px 24px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.header h1 { font-size: 17px; margin-right: 10px; }
.tab { padding: 8px 16px; border-radius: 8px; border: 1.5px solid #2a3045; background: transparent; color: #6b7280; font-size: 13px; font-weight: 700; cursor: pointer; }
.tab.active { background: linear-gradient(135deg,#4f8ef7,#7c5cfc); border-color: transparent; color: #fff; }
.page { display: none; padding: 20px; max-width: 900px; margin: 0 auto; }
.page.active { display: block; }
input, textarea, select { background: #0d0f14; border: 1.5px solid #2a3045; border-radius: 8px; color: #e8eaf0; font-size: 13px; padding: 9px 12px; outline: none; width: 100%; }
input:focus, textarea:focus, select:focus { border-color: #4f8ef7; }
textarea { resize: vertical; min-height: 60px; font-family: sans-serif; }
.field { margin-bottom: 12px; }
.field label { font-size: 12px; color: #6b7280; display: block; margin-bottom: 5px; }
.row { display: flex; gap: 10px; }
.row > * { flex: 1; }
.btn { padding: 9px 18px; border-radius: 8px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.btn-blue { background: linear-gradient(135deg,#4f8ef7,#7c5cfc); color: #fff; }
.btn-green { background: #27ae60; color: #fff; }
.btn-gray { background: #2a3045; color: #e8eaf0; }
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; display: inline-block; }
.bb{background:rgba(79,142,247,0.15);color:#4f8ef7}.bg{background:rgba(39,174,96,0.15);color:#2ecc71}
.bp{background:rgba(124,92,252,0.15);color:#7c5cfc}.bo{background:rgba(230,126,34,0.15);color:#e67e22}
.br{background:rgba(231,76,60,0.15);color:#e74c3c}.bx{background:rgba(107,114,128,0.15);color:#6b7280}
.search-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.search-bar input { flex: 1; min-width: 200px; }
.search-bar select { width: auto; min-width: 130px; flex: 0; }
.q-list { display: flex; flex-direction: column; gap: 8px; }
.q-item { background: #161a23; border: 1px solid #2a3045; border-radius: 10px; padding: 14px 16px; cursor: pointer; transition: all 0.2s; }
.q-item:hover, .q-item.selected { border-color: #4f8ef7; background: #1a1f2e; }
.q-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
.q-purpose { font-size: 13px; color: #e8eaf0; }
.q-sub { font-size: 11px; color: #6b7280; margin-top: 3px; }
.edit-panel { background: #161a23; border: 1px solid #4f8ef7; border-radius: 12px; padding: 20px; margin-top: 16px; }
.edit-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.option-box { background: #0d0f14; border: 1.5px solid #2a3045; border-radius: 8px; padding: 12px; }
.option-box.correct-box { border-color: #27ae60; }
.option-label { font-size: 11px; font-weight: 700; color: #4f8ef7; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
.correct-radio { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #6b7280; cursor: pointer; }
.correct-radio input { width: auto; accent-color: #27ae60; }
.status { padding: 10px 14px; border-radius: 8px; font-size: 13px; font-weight: 700; margin-bottom: 14px; display: none; }
.status.success { background: rgba(39,174,96,0.15); color: #2ecc71; display: block; }
.status.error { background: rgba(231,76,60,0.15); color: #e74c3c; display: block; }
.status.loading { background: rgba(241,196,15,0.1); color: #f1c40f; display: block; }
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(130px,1fr)); gap: 10px; margin-bottom: 16px; }
.stat-card { background: #161a23; border: 1px solid #2a3045; border-radius: 10px; padding: 14px; text-align: center; }
.stat-num { font-size: 28px; font-weight: 900; }
.stat-lbl { font-size: 11px; color: #6b7280; margin-top: 4px; }
.section-lbl { font-size: 11px; font-weight: 700; color: #6b7280; text-transform: uppercase; margin: 12px 0 6px; }
.detail-box { background: #0d0f14; border: 1px solid #2a3045; border-radius: 8px; padding: 12px; }
.null-tag { background: rgba(231,76,60,0.1); color: #e74c3c; font-size: 11px; padding: 3px 8px; border-radius: 5px; display: inline-block; }
.ok-tag { color: #2ecc71; font-size: 11px; }
.spinner { text-align: center; padding: 30px; color: #6b7280; font-size: 13px; }
@media(max-width:600px){.options-grid{grid-template-columns:1fr}.row{flex-direction:column}}
</style>
</head>
<body>
 
<div class="header">
  <h1>🇰🇷 Savol Boshqaruv</h1>
  <button class="tab active" onclick="switchTab('search',this)">🔎 Qidirish & Tahrirlash</button>
  <button class="tab" onclick="switchTab('last',this)">📥 Eng so'nggi</button>
  <button class="tab" onclick="switchTab('stats',this)">📊 Statistika</button>
</div>
 
<!-- SEARCH TAB -->
<div id="tab-search" class="page active">
  <div id="searchStatus" class="status"></div>
  <div class="search-bar">
    <input id="searchInput" type="text" placeholder="🔍 Savol maqsadi bo'yicha qidiring..." oninput="onSearch()"/>
    <select id="filterSection" onchange="onSearch()">
      <option value="">Barcha bo'limlar</option>
      <option value="EPS TOPIK">EPS TOPIK</option>
      <option value="TOPIK 1">TOPIK 1</option>
      <option value="TOPIK 2">TOPIK 2</option>
    </select>
    <select id="filterType" onchange="onSearch()">
      <option value="">Barcha turlar</option>
      <option value="Listening">Listening</option>
      <option value="Reading">Reading</option>
    </select>
    <select id="filterDiff" onchange="onSearch()">
      <option value="">Barcha qiyinliklar</option>
      <option value="Very Easy">Very Easy</option>
      <option value="Easy">Easy</option>
      <option value="Medium">Medium</option>
      <option value="Above Medium">Above Medium</option>
      <option value="Hard">Hard</option>
    </select>
    <button class="btn btn-blue" onclick="loadAll()">🔄 Yuklash</button>
  </div>
  <div id="resultCount" style="font-size:12px;color:#6b7280;margin-bottom:10px;"></div>
  <div id="qList" class="q-list"><div class="spinner">⏳ "Yuklash" tugmasini bosing...</div></div>
  <div id="editPanel" style="display:none"></div>
</div>
 
<!-- LAST TAB -->
<div id="tab-last" class="page">
  <div id="lastStatus" class="status"></div>
  <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
    <select id="lastSection">
      <option value="">Eng so'nggi (barchadan)</option>
      <option value="EPS TOPIK">EPS TOPIK</option>
      <option value="TOPIK 1">TOPIK 1</option>
      <option value="TOPIK 2">TOPIK 2</option>
    </select>
    <button class="btn btn-blue" onclick="loadLast()">📥 Yuklash</button>
  </div>
  <div id="lastResult"></div>
</div>
 
<!-- STATS TAB -->
<div id="tab-stats" class="page">
  <div id="statsStatus" class="status"></div>
  <div style="margin-bottom:14px">
    <button class="btn btn-blue" onclick="loadStats()">📊 Yuklash</button>
  </div>
  <div id="statsResult"></div>
</div>
 
<!-- ✅ Firebase — jsDelivr CDN (ishonchli) -->
<script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/app/dist/index.compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firestore/dist/index.compat.js"></script>
<script>
var db = null;
var allQuestions = [];
var selectedId = null;
 
var FIREBASE_CONFIG = {
  apiKey: "AIzaSyAOgwoxezdtV89KTdapbVHqzYjjt61_Cfk",
  authDomain: "koreantestapp.firebaseapp.com",
  projectId: "koreantestapp",
  storageBucket: "koreantestapp.firebasestorage.app",
  messagingSenderId: "927061643427",
  appId: "1:927061643427:web:89338d7127243e38ed6f16"
};
 
function initFirebase() {
  try {
    if (typeof firebase === 'undefined') {
      setStatus('searchStatus', '❌ Firebase yuklanmadi. Internet aloqasini tekshiring!', 'error');
      return false;
    }
    if (!firebase.apps.length) {
      firebase.initializeApp(FIREBASE_CONFIG);
    }
    db = firebase.firestore();
    setStatus('searchStatus', '✅ Firebase ulandi! "Yuklash" tugmasini bosing.', 'success');
    return true;
  } catch(e) {
    setStatus('searchStatus', '❌ Xato: ' + e.message, 'error');
    return false;
  }
}
 
window.onload = function() {
  // Biroz kuting, keyin init qiling
  setTimeout(initFirebase, 500);
};
 
function setStatus(id, msg, type) {
  var el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.className = 'status ' + type;
}
 
function switchTab(name, btn) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('tab-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
}
 
function checkDb() {
  if (!db) {
    if (!initFirebase()) return false;
  }
  return true;
}
 
// ══════════ SEARCH ══════════
function loadAll() {
  if (!checkDb()) return;
  setStatus('searchStatus', '⏳ Yuklanmoqda...', 'loading');
  document.getElementById('qList').innerHTML = '<div class="spinner">⏳ Yuklanmoqda...</div>';
  document.getElementById('editPanel').style.display = 'none';
 
  db.collection('questions').get().then(function(snap) {
    allQuestions = snap.docs.map(function(d) {
      var data = d.data();
      data._id = d.id;
      return data;
    });
    setStatus('searchStatus', '✅ ' + allQuestions.length + ' ta savol yuklandi!', 'success');
    onSearch();
  }).catch(function(e) {
    setStatus('searchStatus', '❌ Xato: ' + e.message, 'error');
  });
}
 
function onSearch() {
  var q = document.getElementById('searchInput').value.toLowerCase().trim();
  var sec = document.getElementById('filterSection').value;
  var type = document.getElementById('filterType').value;
  var diff = document.getElementById('filterDiff').value;
 
  var filtered = allQuestions.filter(function(item) {
    var purpose = (item.purpose || '').toLowerCase();
    var qtext = (item.questionText || '').toLowerCase();
    var matchQ = !q || purpose.includes(q) || qtext.includes(q);
    var matchS = !sec || item.section === sec;
    var matchT = !type || item.testType === type;
    var matchD = !diff || item.difficulty === diff;
    return matchQ && matchS && matchT && matchD;
  });
 
  renderList(filtered);
}
 
function renderList(list) {
  document.getElementById('resultCount').textContent = list.length + ' ta savol topildi';
  var el = document.getElementById('qList');
  if (list.length === 0) { el.innerHTML = '<div class="spinner">😕 Savol topilmadi</div>'; return; }
  el.innerHTML = '';
  list.forEach(function(item) {
    var div = document.createElement('div');
    div.className = 'q-item' + (item._id === selectedId ? ' selected' : '');
    div.onclick = function() { selectQuestion(item._id); };
    var tc = item.testType === 'Listening' ? 'bg' : item.testType === 'Reading' ? 'bp' : 'br';
    var dc = {'Very Easy':'bg','Easy':'bg','Medium':'bo','Above Medium':'bo','Hard':'br'}[item.difficulty] || 'bx';
    div.innerHTML =
      '<div class="q-meta">' +
        '<span class="badge bb">' + (item.section||'?') + '</span>' +
        '<span class="badge ' + tc + '">' + (item.testType||'⚠️ type yo\'q') + '</span>' +
        '<span class="badge ' + dc + '">' + (item.difficulty||'?') + '</span>' +
        (item.questionAudioUrl ? '<span class="badge bx">🎧</span>' : '') +
        (item.questionImageUrl ? '<span class="badge bx">🖼</span>' : '') +
      '</div>' +
      '<div class="q-purpose">' + (item.purpose || '<span style="color:#6b7280">maqsad yo\'q</span>') + '</div>' +
      (item.questionText ? '<div class="q-sub">' + item.questionText.substring(0,80) + '...</div>' : '');
    el.appendChild(div);
  });
}
 
function selectQuestion(id) {
  selectedId = id;
  onSearch();
  var item = allQuestions.find(function(q) { return q._id === id; });
  if (!item) return;
  var panel = document.getElementById('editPanel');
  panel.style.display = 'block';
 
  var diffOpts = ['Very Easy','Easy','Medium','Above Medium','Hard'].map(function(d) {
    return '<option value="' + d + '"' + (item.difficulty === d ? ' selected' : '') + '>' + d + '</option>';
  }).join('');
 
  var optsHtml = '';
  for (var i = 0; i < 4; i++) {
    var opt = (item.options && item.options[i]) || {};
    var isC = item.correctIndex === i;
    optsHtml +=
      '<div class="option-box' + (isC?' correct-box':'') + '" id="optBox' + i + '">' +
        '<div class="option-label">VARIANT ' + (i+1) +
          '<label class="correct-radio"><input type="radio" name="editCorrect" value="' + i + '"' + (isC?' checked':'') + ' onchange="updateCorrectBox()"> To\'g\'ri ✓</label>' +
        '</div>' +
        '<textarea id="editOpt' + i + '">' + (opt.text||'') + '</textarea>' +
      '</div>';
  }
 
  panel.innerHTML =
    '<div class="edit-panel">' +
      '<div class="edit-title">✏️ Tahrirlash <button class="btn btn-gray" onclick="closeEdit()">✕ Yopish</button></div>' +
      '<div id="editStatus" class="status"></div>' +
      '<div class="row">' +
        '<div class="field"><label>Bo\'lim</label><select id="editSection">' +
          '<option' + (item.section==='EPS TOPIK'?' selected':'') + '>EPS TOPIK</option>' +
          '<option' + (item.section==='TOPIK 1'?' selected':'') + '>TOPIK 1</option>' +
          '<option' + (item.section==='TOPIK 2'?' selected':'') + '>TOPIK 2</option>' +
        '</select></div>' +
        '<div class="field"><label>Test turi</label><select id="editTestType">' +
          '<option value="Reading"' + (item.testType==='Reading'?' selected':'') + '>📖 Reading</option>' +
          '<option value="Listening"' + (item.testType==='Listening'?' selected':'') + '>🎧 Listening</option>' +
        '</select></div>' +
        '<div class="field"><label>Qiyinlik</label><select id="editDiff">' + diffOpts + '</select></div>' +
      '</div>' +
      '<div class="field"><label>Savol maqsadi</label><textarea id="editPurpose">' + (item.purpose||'') + '</textarea></div>' +
      '<div class="field"><label>Savol matni</label><textarea id="editQText">' + (item.questionText||'') + '</textarea></div>' +
      '<div class="field"><label>Variantlar</label><div class="options-grid">' + optsHtml + '</div></div>' +
      '<div style="display:flex;gap:10px;margin-top:16px">' +
        '<button class="btn btn-green" onclick="saveEdit(\'' + id + '\')">💾 Saqlash</button>' +
        '<button class="btn btn-gray" onclick="closeEdit()">Bekor qilish</button>' +
      '</div>' +
    '</div>';
 
  panel.scrollIntoView({ behavior:'smooth', block:'start' });
}
 
function updateCorrectBox() {
  for (var i = 0; i < 4; i++) {
    var b = document.getElementById('optBox' + i);
    if (b) b.className = 'option-box';
  }
  var c = document.querySelector('input[name="editCorrect"]:checked');
  if (c) { var b = document.getElementById('optBox' + c.value); if (b) b.className = 'option-box correct-box'; }
}
 
function saveEdit(id) {
  var c = document.querySelector('input[name="editCorrect"]:checked');
  if (!c) { setStatus('editStatus', '❌ To\'g\'ri javobni tanlang!', 'error'); return; }
  setStatus('editStatus', '⏳ Saqlanmoqda...', 'loading');
 
  var item = allQuestions.find(function(q) { return q._id === id; });
  var opts = [];
  for (var i = 0; i < 4; i++) {
    var old = (item && item.options && item.options[i]) || {};
    opts.push({ text: document.getElementById('editOpt' + i).value.trim() || null, fontSize: old.fontSize||18, audioUrl: old.audioUrl||null, imageUrl: old.imageUrl||null });
  }
 
  var upd = {
    section: document.getElementById('editSection').value,
    testType: document.getElementById('editTestType').value,
    difficulty: document.getElementById('editDiff').value,
    purpose: document.getElementById('editPurpose').value.trim() || null,
    questionText: document.getElementById('editQText').value.trim() || null,
    correctIndex: parseInt(c.value),
    options: opts,
  };
 
  db.collection('questions').doc(id).update(upd).then(function() {
    var idx = allQuestions.findIndex(function(q) { return q._id === id; });
    if (idx !== -1) Object.keys(upd).forEach(function(k) { allQuestions[idx][k] = upd[k]; });
    setStatus('editStatus', '✅ Saqlandi!', 'success');
    onSearch();
  }).catch(function(e) {
    setStatus('editStatus', '❌ Xato: ' + e.message, 'error');
  });
}
 
function closeEdit() {
  selectedId = null;
  document.getElementById('editPanel').style.display = 'none';
  onSearch();
}
 
// ══════════ LAST ══════════
function loadLast() {
  if (!checkDb()) return;
  setStatus('lastStatus', '⏳ Yuklanmoqda...', 'loading');
  document.getElementById('lastResult').innerHTML = '';
 
  var sec = document.getElementById('lastSection').value;
  var ref = db.collection('questions').orderBy('createdAt','desc').limit(1);
  if (sec) ref = db.collection('questions').where('section','==',sec).orderBy('createdAt','desc').limit(1);
 
  ref.get().then(function(snap) {
    if (snap.empty) { setStatus('lastStatus', '😕 Savol topilmadi', 'error'); return; }
    var d = snap.docs[0].data();
    setStatus('lastStatus', '✅ Yuklandi!', 'success');
    var html = '<div style="background:#161a23;border:1px solid #2a3045;border-radius:12px;padding:20px">';
    html += '<div class="q-meta" style="margin-bottom:12px">';
    html += '<span class="badge bb">' + (d.section||'?') + '</span>';
    html += '<span class="badge ' + (d.testType==='Listening'?'bg':'bp') + '">' + (d.testType||'⚠️ testType YO\'Q') + '</span>';
    html += '<span class="badge bo">' + (d.difficulty||'?') + '</span></div>';
    html += '<div class="section-lbl">📌 Savol maqsadi</div>';
    html += d.purpose ? '<div class="detail-box">' + d.purpose + '</div>' : '<span class="null-tag">null</span>';
    html += '<div class="section-lbl">❓ Savol matni</div>';
    html += d.questionText ? '<div class="detail-box">' + d.questionText + '</div>' : '<span class="null-tag">null</span>';
    html += '<div class="section-lbl">🎧 Audio</div>';
    if (d.questionAudioUrl) { html += '<div class="ok-tag">✅ URL bor</div><audio controls src="' + d.questionAudioUrl + '" style="width:100%;margin-top:6px"></audio>'; }
    else html += '<span class="null-tag">null</span>';
    html += '<div class="section-lbl">🖼 Rasm</div>';
    if (d.questionImageUrl) html += '<img src="' + d.questionImageUrl + '" style="max-width:100%;max-height:200px;border-radius:8px;margin-top:6px"/>';
    else html += '<span class="null-tag">null</span>';
    html += '<div class="section-lbl">📋 Variantlar</div>';
    if (d.options) d.options.forEach(function(opt,i) {
      var isC = i === d.correctIndex;
      html += '<div style="background:#0d0f14;border:1.5px solid ' + (isC?'#27ae60':'#2a3045') + ';border-radius:8px;padding:10px;margin-bottom:8px">';
      html += '<span style="color:#4f8ef7;font-weight:800">' + (i+1) + (isC?' ✅':'') + '</span> ';
      html += opt.text ? '<span>' + opt.text + '</span>' : '<span class="null-tag">null</span>';
      if (opt.audioUrl) html += '<audio controls src="' + opt.audioUrl + '" style="width:100%;margin-top:4px"></audio>';
      if (opt.imageUrl) html += '<img src="' + opt.imageUrl + '" style="max-width:100%;max-height:100px;border-radius:6px;margin-top:4px"/>';
      html += '</div>';
    });
    html += '</div>';
    document.getElementById('lastResult').innerHTML = html;
  }).catch(function(e) { setStatus('lastStatus', '❌ Xato: ' + e.message, 'error'); });
}
 
// ══════════ STATS ══════════
function loadStats() {
  if (!checkDb()) return;
  setStatus('statsStatus', '⏳ Yuklanmoqda...', 'loading');
 
  db.collection('questions').get().then(function(snap) {
    var total = snap.size;
    var bySection = {}, byType = {Listening:0,Reading:0,noType:0}, byDiff = {};
    snap.docs.forEach(function(d) {
      var data = d.data();
      bySection[data.section] = (bySection[data.section]||0) + 1;
      if (data.testType==='Listening') byType.Listening++;
      else if (data.testType==='Reading') byType.Reading++;
      else byType.noType++;
      byDiff[data.difficulty] = (byDiff[data.difficulty]||0) + 1;
    });
 
    function sc(num, label, color) {
      return '<div class="stat-card"><div class="stat-num" style="color:' + color + '">' + num + '</div><div class="stat-lbl">' + label + '</div></div>';
    }
 
    var html = '<div class="stat-grid">';
    html += sc(total,'Jami','#e8eaf0') + sc(byType.Listening,'🎧 Listening','#2ecc71') + sc(byType.Reading,'📖 Reading','#7c5cfc') + sc(byType.noType,'⚠️ Type yo\'q', byType.noType>0?'#e74c3c':'#2ecc71');
    html += '</div><div style="font-size:12px;font-weight:700;color:#6b7280;margin:14px 0 8px">BO\'LIM BO\'YICHA</div><div class="stat-grid">';
    Object.keys(bySection).forEach(function(k) { html += sc(bySection[k], k, '#4f8ef7'); });
    html += '</div><div style="font-size:12px;font-weight:700;color:#6b7280;margin:14px 0 8px">QIYINLIK BO\'YICHA</div><div class="stat-grid">';
    var dc = {'Very Easy':'#27ae60','Easy':'#2ecc71','Medium':'#f1c40f','Above Medium':'#e67e22','Hard':'#e74c3c'};
    ['Very Easy','Easy','Medium','Above Medium','Hard'].forEach(function(k) { html += sc(byDiff[k]||0, k, dc[k]); });
    html += '</div>';
 
    document.getElementById('statsResult').innerHTML = html;
    setStatus('statsStatus', '✅ Tayyor!', 'success');
  }).catch(function(e) { setStatus('statsStatus', '❌ Xato: ' + e.message, 'error'); });
}
</script>
</body>
</html>
